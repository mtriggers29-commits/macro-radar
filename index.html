<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Macro Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    button { cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

    // ── Sheet config ──────────────────────────────────────────────────────
    const CLAUDE_API = "https://api.groq.com/openai/v1/chat/completions";
    // ── API key management ────────────────────────────────────────────────────
    // Anthropic API requires a key — stored in localStorage, never in the code.
    // User enters it once via the key prompt. Set ANTHROPIC_KEY='' to clear.
    const getApiKey = () => localStorage.getItem("macro_radar_api_key") || "";
    const setApiKey = (k) => localStorage.setItem("macro_radar_api_key", k.trim());
    const clearApiKey = () => localStorage.removeItem("macro_radar_api_key");

    const SHEET_ID     = "1hGTwlIhPwi12-vjqaA92umV2oFgjU9aa-ffCoFNUQS8";
    const SHEET_CSV    = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=305154053`;
    const CATALYST_GID = "325389479";
    const CATALYST_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${CATALYST_GID}`;

    // ── Design tokens ─────────────────────────────────────────────────────
    const C = {
      bg: "#0d1117", surface: "#161b22", border: "#30363d",
      text: "#e6edf3", muted: "#8b949e", blue: "#58a6ff",
      red: "#f85149", green: "#3fb950", amber: "#f0b453",
      chartBlue: "#79c6ff", accent: "#00d4ff", hover: "#1f2937",
      purple: "#bc8cff",
    };
    const mono = "'JetBrains Mono', monospace";
    const sans = "'Inter', system-ui, sans-serif";

    // ── CSV parser ────────────────────────────────────────────────────────
    function parseCSV(text) {
      const lines = text.trim().split("\n").slice(1);
      const out = {};
      for (const line of lines) {
        const cols = [];
        let cur = "", inQ = false;
        for (const ch of line) {
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
          else cur += ch;
        }
        cols.push(cur.trim());
        const [key, value, change, unit, source, updated_at] = cols;
        if (!key) continue;
        const chg = parseFloat(change);
        out[key] = {
          value: value || null,
          change: isNaN(chg) ? null : chg,
          unit: unit || "",
          source: source || "Sheet",
          updatedAt: updated_at || null,
          stale: isStale(updated_at),
        };
      }
      return out;
    }

    function isStale(ts) {
      if (!ts) return true;
      try { return Date.now() - new Date(ts).getTime() > 48 * 3600 * 1000; }
      catch { return true; }
    }

    function now() {
      return new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    // ── Signal functions ──────────────────────────────────────────────────
    const SIGNAL_FN = {
      dxy:         p => p.change < 0 ? "bull" : "bear",
      vix:         p => { const v = parseFloat(p.value); if (isNaN(v)) return "neutral"; if (v >= 30) return "bear"; if (v >= 20) return "neutral"; return "bull"; },
      m2:          p => p.change > 0 ? "bull" : "bear",
      walcl:       p => p.change > 0 ? "bull" : "bear",
      wti:         p => p.change > 0 ? "bear" : "bull",
      natgas:      p => p.change > 0 ? "bear" : "bull",
      ethbtc:      p => parseFloat(p.value) >= 0.040 ? "bull" : "neutral",
      dom:         p => p.change < 0 ? "bull" : "neutral",
      btcetf:      p => parseFloat(p.value) > 0 ? "bull" : "bear",
      ethetf:      p => parseFloat(p.value) > 0 ? "bull" : "bear",
      funding:     p => { const v = parseFloat(p.value); if (isNaN(v)) return "neutral"; if (v > 0.05) return "bear"; if (v > 0.01) return "bull"; if (v > -0.01) return "neutral"; if (v > -0.05) return "bear"; return "bull"; },
      btc:         p => p.change > 0 ? "bull" : "bear",
      eth:         p => p.change > 0 ? "bull" : "bear",
      fg:          p => parseFloat(p.value) < 20 ? "bull" : parseFloat(p.value) > 75 ? "bear" : "neutral",
      y10:         p => p.change > 0 ? "bear" : "bull",
      y2:          p => p.change > 0 ? "bear" : "bull",
      fedfunds:    p => p.change > 0 ? "bear" : "bull",
      tga:         p => p.change < 0 ? "bull" : "neutral",
      rrp:         p => p.change > 0 ? "bull" : "bear",
      cpi:         p => p.change < 0 ? "bull" : p.change > 0 ? "bear" : "neutral",
      spread:      p => parseFloat(p.value) < 0 ? "bear" : "neutral",
      ism:         p => { const v = parseFloat(p.value); if (isNaN(v)) return "neutral"; return v >= 50 ? "bull" : "bear"; },
      oi:          p => { const c = p.change; if (c == null || isNaN(c)) return "neutral"; return c > 0 ? "bull" : "bear"; },
      stabvol:     p => { const c = p.change; if (c == null || isNaN(c)) return "neutral"; return c > 5 ? "bull" : c < -5 ? "bear" : "neutral"; },
      soletf:      p => parseFloat(p.value) > 0 ? "bull" : "bear",
      sui:         p => p.change > 0 ? "bull" : "bear",
      sui_funding: p => { const v = parseFloat(p.value); if (isNaN(v)) return "neutral"; if (v > 0.05) return "bear"; if (v > 0.01) return "bull"; if (v > -0.01) return "neutral"; return "bear"; },
      sui_oi:      p => { const c = p.change; if (c == null || isNaN(c)) return "neutral"; return c > 5 ? "bull" : c > -1 ? "neutral" : "bear"; },
      // Markets tab — parsed separately in MarketsTab, signal just reads the change
      mkt_SPY:       p => p.change > 0 ? "bull" : p.change < 0 ? "bear" : "neutral",
      mkt_QQQ:       p => p.change > 0 ? "bull" : p.change < 0 ? "bear" : "neutral",
      mkt_IWM:       p => p.change > 0 ? "bull" : p.change < 0 ? "bear" : "neutral",
      mkt_ARKX:      p => p.change > 0 ? "bull" : p.change < 0 ? "bear" : "neutral",
      mkt_SMH:       p => p.change > 0 ? "bull" : p.change < 0 ? "bear" : "neutral",
      mkt_XLE:       p => p.change > 0 ? "bull" : p.change < 0 ? "bear" : "neutral",
      mkt_liq_align: p => p.value === "aligned-bull" ? "bull" : p.value === "aligned-bear" ? "bear" : p.value === "diverging-caution" ? "bear" : "neutral",
    };

    // ── Zone helpers ──────────────────────────────────────────────────────
    function domZone(value) {
      const v = parseFloat(value);
      if (isNaN(v)) return { color: C.muted, label: "—", subtext: "↓ Falling = alt season" };
      if (v >= 60)  return { color: C.blue,      label: `► ${v.toFixed(2)}% — BTC Phase`,         subtext: "BTC dominant — hold BTC, avoid alts" };
      if (v >= 55)  return { color: C.amber,     label: `▼ ${v.toFixed(2)}% — Rotation Starting`, subtext: "Capital rotating → ETH/SOL/SUI" };
      if (v >= 50)  return { color: C.chartBlue, label: `▼ ${v.toFixed(2)}% — Alt Season Near`,   subtext: "Approaching confirmed altseason" };
      if (v >= 40)  return { color: C.green,     label: `▼ ${v.toFixed(2)}% — Alt Season ✓`,      subtext: "Optimal zone — broad alt rally" };
      return               { color: C.red,       label: `▼ ${v.toFixed(2)}% — Euphoria Zone`,     subtext: "⚠ Below 40% — market top risk" };
    }
    function vixZone(value) {
      const v = parseFloat(value);
      if (isNaN(v) || !value) return { color: C.muted, label: null, subtext: "S&P 500 30-day implied vol" };
      if (v >= 40) return { color: C.red,    label: `▲ ${v.toFixed(2)} — Extreme Panic`, subtext: "⚠ Capitulation territory · watch for reversal" };
      if (v >= 30) return { color: C.red,    label: `▲ ${v.toFixed(2)} — High Fear`,     subtext: "Risk-off · equity stress elevated" };
      if (v >= 20) return { color: C.amber,  label: `► ${v.toFixed(2)} — Elevated`,      subtext: "Caution · uncertainty building" };
      return              { color: C.green,  label: `▼ ${v.toFixed(2)} — Calm`,          subtext: "Low volatility · risk-on conditions" };
    }
    function fundingZone(value) {
      const v = parseFloat(value);
      if (isNaN(v) || value == null) return { color: C.muted, label: null, subtext: "Funding rate signal" };
      if (v > 0.05)  return { color: C.red,       label: `▲ ${v.toFixed(4)}% — Overheated Longs`,  subtext: "⚠ Long squeeze risk — crowded trade" };
      if (v > 0.01)  return { color: C.green,     label: `▲ ${v.toFixed(4)}% — Bullish`,           subtext: "Longs paying · healthy long bias" };
      if (v > -0.01) return { color: C.chartBlue, label: `► ${v.toFixed(4)}% — Neutral`,           subtext: "Balanced market · low squeeze risk" };
      if (v > -0.05) return { color: C.red,       label: `▼ ${v.toFixed(4)}% — Bearish`,           subtext: "Shorts dominant · bearish sentiment" };
      return               { color: C.amber,      label: `▼ ${v.toFixed(4)}% — Overheated Shorts`, subtext: "⚠ Short squeeze potential — extreme fear" };
    }
    function oiZone(oiValue, oiChg, priceChg) {
      if (oiChg == null || isNaN(parseFloat(oiChg)) || !oiValue) return { color: C.muted, label: null, subtext: "Price × OI = combined signal" };
      const oi = parseFloat(oiChg), pr = parseFloat(priceChg);
      const oiUp = oi >= 0, prUp = !isNaN(pr) && pr >= 0;
      if (isNaN(pr)) return oiUp ? { color: C.chartBlue, label: `▲ OI +${oi.toFixed(1)}% — Building`, subtext: "OI rising · await price direction" } : { color: C.amber, label: `▼ OI ${oi.toFixed(1)}% — Declining`, subtext: "OI falling · positions closing" };
      if (prUp && oiUp)   return { color: C.green,     label: `▲ Price +${pr.toFixed(1)}% · OI +${oi.toFixed(1)}% — BULLISH`,  subtext: "New longs entering · uptrend strengthening" };
      if (!prUp && oiUp)  return { color: C.red,       label: `▼ Price ${pr.toFixed(1)}% · OI +${oi.toFixed(1)}% — BEARISH`,   subtext: "New shorts entering · downtrend strengthening" };
      if (prUp && !oiUp)  return { color: C.amber,     label: `▲ Price +${pr.toFixed(1)}% · OI ${oi.toFixed(1)}% — WEAKENING`, subtext: "Shorts covering / profit-taking · trend losing conviction" };
      return { color: C.chartBlue, label: `▼ Price ${pr.toFixed(1)}% · OI ${oi.toFixed(1)}% — BOTTOMING?`, subtext: "Panic selling or shorts covering · watch for reversal" };
    }
    function stabvolZone(value, change) {
      if (change == null || isNaN(change) || !value) return { color: C.muted, label: null, subtext: "24h USDT volume · activity signal" };
      const c = parseFloat(change);
      if (c > 20)  return { color: C.amber,     label: `▲ +${c.toFixed(1)}% — Extreme Spike`, subtext: "⚠ Major capital in motion · check other signals" };
      if (c > 5)   return { color: C.green,     label: `▲ +${c.toFixed(1)}% — Active`,        subtext: "Participation rising · dry powder building" };
      if (c > -5)  return { color: C.chartBlue, label: `► ${c.toFixed(1)}% — Normal`,         subtext: "Routine activity · no strong signal" };
      return              { color: C.red,       label: `▼ ${c.toFixed(1)}% — Declining`,      subtext: "Low participation · complacency or fully deployed" };
    }
    function ismZone(value, change) {
      const v = parseFloat(value), chg = parseFloat(change);
      if (isNaN(v) || !value) return { color: C.muted, label: null, subtext: "ISM Manufacturing PMI · >50 = expansion" };
      const trend = !isNaN(chg) ? (chg > 0 ? ` ▲ +${chg.toFixed(1)}` : chg < 0 ? ` ▼ ${chg.toFixed(1)}` : "") : "";
      if (v >= 55) return { color: C.green,     label: `${v.toFixed(1)}${trend} — Strong Expansion`, subtext: "Manufacturing expanding rapidly · bullish" };
      if (v >= 50) return { color: C.chartBlue, label: `${v.toFixed(1)}${trend} — Expanding`,        subtext: "Above 50 · growth cycle intact" };
      if (v >= 45) return { color: C.amber,     label: `${v.toFixed(1)}${trend} — Contracting`,      subtext: "Below 50 · watch for deterioration" };
      return              { color: C.red,       label: `${v.toFixed(1)}${trend} — Deep Contraction`, subtext: "⚠ Below 45 · recession signal" };
    }
    function netliqZone(value, change) {
      if (!value || change == null || isNaN(change)) return { color: C.muted, label: null, subtext: "WALCL − TGA − RRP" };
      const c = parseFloat(change);
      if (c > 1)  return { color: C.green,     label: `▲ +${c.toFixed(1)}% — Expanding`,   subtext: "Liquidity rising · bullish for risk assets" };
      if (c > 0)  return { color: C.chartBlue, label: `▲ +${c.toFixed(2)}% — Slight Rise`,  subtext: "Mild liquidity expansion" };
      if (c === 0) return { color: C.chartBlue, label: `► Unchanged`,                        subtext: "Flat liquidity · no strong signal" };
      if (c > -1) return { color: C.amber,     label: `▼ ${c.toFixed(2)}% — Slight Drain`,  subtext: "Mild liquidity contraction · watch closely" };
      return             { color: C.red,       label: `▼ ${c.toFixed(1)}% — Contracting`,   subtext: "⚠ Liquidity draining · bearish for risk assets" };
    }
    function spreadSignalColor(value) {
      if (!value) return C.muted;
      const v = parseFloat(value);
      if (isNaN(v)) return C.muted;
      if (v < 0) return C.red;
      if (v < 0.5) return C.amber;
      return C.chartBlue;
    }
    function fedfundsSignalColor(change) {
      if (change == null) return C.muted;
      if (change > 0) return C.red;
      if (change < 0) return C.green;
      return C.chartBlue;
    }

    // ── Shared UI components ──────────────────────────────────────────────
    function Tag({ label }) {
      const colors = { bull: C.green, bear: C.red, watch: C.amber, neutral: C.muted };
      const col = colors[label] || C.muted;
      return <span style={{ fontSize: 10, fontFamily: mono, color: col, background: col + "22", border: `1px solid ${col}44`, borderRadius: 3, padding: "1px 6px", textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</span>;
    }

    function MetricCard({ label, value, change, unit="", source, updatedAt, stale, flash, invertSignal, subtext, signalColor, changeLabel }) {
      const [hov, setHov] = useState(false);
      const isPos = change > 0, isNeg = change < 0;
      let changeColor = invertSignal ? (isPos ? C.red : isNeg ? C.green : C.muted) : (isPos ? C.green : isNeg ? C.red : C.muted);
      if (signalColor) changeColor = signalColor;
      const hasChangeRow = change != null || changeLabel != null;
      return (
        <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ background: C.surface, border: `1px solid ${flash ? C.blue : C.border}`, borderRadius: 8, padding: "14px 16px", transition: "all 0.2s", transform: hov ? "scale(1.02)" : "scale(1)", boxShadow: flash ? `0 0 0 2px ${C.blue}44` : "none", minWidth: 0 }}>
          <div style={{ fontSize: 11, fontFamily: mono, color: C.muted, marginBottom: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ textTransform: "uppercase", letterSpacing: "0.07em" }}>{label}</span>
            {stale && <span style={{ color: C.amber, fontSize: 10 }}>⚠ STALE</span>}
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginBottom: 4 }}>
            <span style={{ fontSize: 26, fontFamily: sans, fontWeight: 700, color: C.text, letterSpacing: "-0.5px" }}>
              {value || <span style={{ color: C.muted, fontSize: 16 }}>—</span>}
            </span>
            {unit && <span style={{ fontSize: 13, fontFamily: mono, color: C.muted }}>{unit}</span>}
          </div>
          {hasChangeRow && (
            <div style={{ fontSize: 12, fontFamily: mono, color: changeColor }}>
              {changeLabel != null ? changeLabel : <>{isPos ? "▲" : isNeg ? "▼" : "—"} {Math.abs(change).toFixed(2)}%<span style={{ color: C.muted, marginLeft: 6, fontSize: 10 }}>24h</span></>}
            </div>
          )}
          {subtext && <div style={{ fontSize: 11, fontFamily: mono, color: C.muted, marginTop: 4 }}>{subtext}</div>}
          <div style={{ marginTop: 10, fontSize: 10, fontFamily: mono, display: "flex", justifyContent: "space-between" }}>
            <span style={{ color: C.muted + "99" }}>{source || "—"}</span>
            <span style={{ color: C.muted + "66" }}>{updatedAt || "—"}</span>
          </div>
        </div>
      );
    }

    function SectionLabel({ children }) {
      return <div style={{ fontSize: 11, fontFamily: mono, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10, paddingBottom: 6, borderBottom: `1px solid ${C.border}` }}>{children}</div>;
    }

    function SignalBar({ signals }) {
      const vals = Object.values(signals).filter(Boolean);
      const bulls = vals.filter(v => v === "bull").length;
      const bears = vals.filter(v => v === "bear").length;
      const total = vals.length || 1;
      const overall = bears >= 4 ? "DEFENSIVE" : bulls >= 5 ? "BULLISH" : "NEUTRAL";
      const col = overall === "DEFENSIVE" ? C.red : overall === "BULLISH" ? C.green : C.amber;
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 20px", display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: col, boxShadow: `0 0 6px ${col}88` }} />
            <span style={{ fontFamily: sans, fontWeight: 700, fontSize: 15, color: col }}>{overall}</span>
          </div>
          <div style={{ display: "flex", gap: 4, flex: 1, minWidth: 120 }}>
            {Array.from({ length: total }).map((_, i) => <div key={i} style={{ flex: 1, height: 5, borderRadius: 3, background: i < bulls ? C.green : i < bulls + bears ? C.red : C.chartBlue }} />)}
          </div>
          <span style={{ fontFamily: mono, fontSize: 11, color: C.muted }}>{bulls} bull · {bears} bear · {total - bulls - bears} neutral</span>
          {bears >= 4 && <span style={{ fontFamily: mono, fontSize: 11, color: C.red, background: C.red + "18", border: `1px solid ${C.red}44`, borderRadius: 4, padding: "2px 8px" }}>⚠ 4+ RED — consider stables</span>}
        </div>
      );
    }

    function ScanLog({ log }) {
      if (!log.length) return null;
      return (
        <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "10px 14px", maxHeight: 160, overflowY: "auto" }}>
          {log.map((l, i) => (
            <div key={i} style={{ fontFamily: mono, fontSize: 11, lineHeight: 1.8, display: "flex", gap: 10 }}>
              <span style={{ color: l.ok ? C.green : C.red }}>{l.ok ? "✓" : "✗"}</span>
              <span style={{ color: C.muted }}>{l.time}</span>
              <span style={{ color: C.text }}>{l.source}</span>
              <span style={{ color: l.ok ? C.muted : C.red }}>{l.note}</span>
            </div>
          ))}
        </div>
      );
    }

    function FearGauge({ value }) {
      if (value == null) return <div style={{ color: C.muted, fontFamily: mono }}>— run scan</div>;
      const v = Math.max(0, Math.min(100, value));
      const col = v < 20 ? C.green : v < 40 ? C.chartBlue : v < 60 ? C.amber : v < 75 ? C.amber : C.red;
      const lbl = v < 20 ? "Extreme Fear" : v < 40 ? "Fear" : v < 60 ? "Neutral" : v < 75 ? "Greed" : "Extreme Greed";
      const angle = (v / 100) * 180 - 90;
      const r = 52, cx = 70, cy = 68;
      const rad = d => d * Math.PI / 180;
      const nx = cx + r * 0.75 * Math.cos(rad(angle - 90));
      const ny = cy + r * 0.75 * Math.sin(rad(angle - 90));
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
          <svg width="140" height="80" style={{ overflow: "visible" }}>
            {[C.red, C.amber, C.chartBlue, C.amber, C.red].map((c, i) => {
              const s = i * 36 - 90, e = s + 36;
              const sx = cx + r * Math.cos(rad(s)), sy = cy + r * Math.sin(rad(s));
              const ex = cx + r * Math.cos(rad(e)), ey = cy + r * Math.sin(rad(e));
              return <path key={i} d={`M${cx},${cy} L${sx},${sy} A${r},${r} 0 0,1 ${ex},${ey} Z`} fill={[C.red+"44",C.amber+"33",C.chartBlue+"33",C.amber+"33",C.red+"44"][i]} stroke="none" />;
            })}
            <line x1={cx} y1={cy} x2={nx} y2={ny} stroke={col} strokeWidth={2.5} strokeLinecap="round" />
            <circle cx={cx} cy={cy} r={4} fill={col} />
          </svg>
          <div style={{ fontFamily: sans, fontSize: 28, fontWeight: 700, color: col, marginTop: -8 }}>{v}</div>
          <div style={{ fontFamily: mono, fontSize: 11, color: col, marginTop: 2 }}>{lbl}</div>
        </div>
      );
    }

    function DomZoneBar({ value }) {
      const v = parseFloat(value);
      if (isNaN(v)) return null;
      const zones = [
        { label: ">60%", min: 60, max: 80, color: C.blue, desc: "BTC Phase" },
        { label: "55–60%", min: 55, max: 60, color: C.amber, desc: "Rotation" },
        { label: "50–55%", min: 50, max: 55, color: C.chartBlue, desc: "Alt Near" },
        { label: "40–50%", min: 40, max: 50, color: C.green, desc: "Altseason" },
        { label: "<40%", min: 0, max: 40, color: C.red, desc: "Euphoria" },
      ];
      let pct;
      if (v >= 80) pct = 100; else if (v >= 60) pct = 75 + ((v - 60) / 20) * 25;
      else if (v >= 55) pct = 50 + ((v - 55) / 5) * 25; else if (v >= 50) pct = 25 + ((v - 50) / 5) * 25;
      else if (v >= 40) pct = 0 + ((v - 40) / 10) * 25; else pct = 0;
      return (
        <div style={{ marginTop: 10 }}>
          <div style={{ display: "flex", gap: 4, marginBottom: 6, flexWrap: "wrap" }}>
            {zones.map(z => {
              const active = v >= z.min && v < z.max;
              return <span key={z.label} style={{ fontFamily: mono, fontSize: 9, padding: "1px 6px", borderRadius: 3, color: z.color, background: active ? z.color + "33" : z.color + "11", border: `1px solid ${active ? z.color + "88" : z.color + "22"}`, fontWeight: active ? 700 : 400 }}>{z.label}</span>;
            })}
          </div>
          <div style={{ position: "relative", height: 6, borderRadius: 4, background: `linear-gradient(to left, ${C.blue}, ${C.amber}, ${C.chartBlue}, ${C.green}, ${C.red})` }}>
            <div style={{ position: "absolute", top: -4, left: `${pct}%`, transform: "translateX(-50%)", width: 3, height: 14, borderRadius: 2, background: C.text, boxShadow: `0 0 4px #000` }} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: mono, fontSize: 9, color: C.muted, marginTop: 3 }}>
            <span style={{ color: C.red }}>40%</span><span style={{ color: C.green }}>50%</span>
            <span style={{ color: C.chartBlue }}>55%</span><span style={{ color: C.amber }}>60%</span>
            <span style={{ color: C.blue }}>80%+</span>
          </div>
        </div>
      );
    }

    function RangeBar({ price, high, low, label }) {
      if (!price || !high || !low || high <= low) return null;
      const pct = Math.min(100, Math.max(0, ((price - low) / (high - low)) * 100));
      const col = pct > 70 ? C.green : pct > 30 ? C.amber : C.red;
      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: mono, fontSize: 10, color: C.muted, marginBottom: 4 }}>
            <span style={{ color: C.red }}>L ${low.toLocaleString()}</span>
            <span style={{ color: C.muted }}>{label} 24h Range</span>
            <span style={{ color: C.green }}>H ${high.toLocaleString()}</span>
          </div>
          <div style={{ background: C.border, borderRadius: 4, height: 6, position: "relative" }}>
            <div style={{ position: "absolute", left: 0, top: 0, width: `${pct}%`, height: "100%", background: `linear-gradient(to right, ${C.red}, ${C.amber}, ${C.green})`, borderRadius: 4 }} />
            <div style={{ position: "absolute", top: -4, left: `${pct}%`, transform: "translateX(-50%)", width: 3, height: 14, background: C.text, borderRadius: 2, boxShadow: "0 0 4px #000" }} />
          </div>
          <div style={{ fontFamily: mono, fontSize: 10, color: col, marginTop: 3, textAlign: "center" }}>${price.toLocaleString()} · {pct.toFixed(0)}% of range</div>
        </div>
      );
    }

    function USSessionClock() {
      const [nowTime, setNowTime] = useState(new Date());
      useEffect(() => { const t = setInterval(() => setNowTime(new Date()), 1000); return () => clearInterval(t); }, []);
      const etStr = nowTime.toLocaleString("en-US", { timeZone: "America/New_York", hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
      const ukStr = nowTime.toLocaleString("en-GB", { timeZone: "Europe/London", hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
      const etParts = etStr.split(":").map(Number);
      const etMins = etParts[0] * 60 + etParts[1];
      const sessions = [
        { name: "Pre-Market", start: 4*60, end: 9*60+30, color: C.amber },
        { name: "NYSE Open", start: 9*60+30, end: 16*60, color: C.green },
        { name: "After Hours", start: 16*60, end: 20*60, color: C.amber },
        { name: "Market Closed", start: 20*60, end: 28*60, color: C.muted },
      ];
      let current = sessions[3], nextSession = sessions[0], minsToNext = 0;
      for (let i = 0; i < sessions.length; i++) {
        const s = sessions[i];
        if (etMins >= s.start && etMins < s.end) {
          current = s; nextSession = sessions[(i + 1) % sessions.length]; minsToNext = s.end - etMins; break;
        }
      }
      if (minsToNext === 0) { minsToNext = sessions[0].start - etMins; if (minsToNext < 0) minsToNext += 24 * 60; }
      const hh = Math.floor(minsToNext / 60), mm = minsToNext % 60;
      const countdown = hh + "h " + String(mm).padStart(2, "0") + "m";
      const sessionPct = current.name === "NYSE Open" ? Math.min(100, ((etMins - 9*60-30) / 390) * 100) : null;
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "14px 20px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: current.color, boxShadow: current.name === "NYSE Open" ? `0 0 6px ${current.color}` : "none" }} />
              <div>
                <div style={{ fontFamily: sans, fontWeight: 700, fontSize: 14, color: current.color }}>{current.name}</div>
                <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginTop: 2 }}>
                  {current.name === "NYSE Open" ? `Closes in ${countdown}` : `${nextSession.name} in ${countdown}`}
                </div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 24 }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontFamily: mono, fontSize: 18, fontWeight: 700, color: C.text, letterSpacing: "0.05em" }}>{etStr}</div>
                <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginTop: 2 }}>NEW YORK (ET)</div>
              </div>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontFamily: mono, fontSize: 18, fontWeight: 700, color: C.chartBlue, letterSpacing: "0.05em" }}>{ukStr}</div>
                <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginTop: 2 }}>LONDON (UK)</div>
              </div>
            </div>
          </div>
          {sessionPct !== null && (
            <div style={{ marginTop: 10 }}>
              <div style={{ background: C.border, borderRadius: 3, height: 4 }}>
                <div style={{ width: `${sessionPct}%`, background: C.green, borderRadius: 3, height: "100%", transition: "width 1s" }} />
              </div>
              <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginTop: 3 }}>NYSE session progress · 09:30–16:00 ET · 14:30–21:00 UK</div>
            </div>
          )}
        </div>
      );
    }

    function LiquidityChart() {
      const [chartData, setChartData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [lagWeeks, setLagWeeks] = useState(10);
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      const BTC_URL = "https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1w&limit=65";
      const fetchChartData = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          // WALCL via FRED JSON API — no CORS issues, no proxy needed
          const FRED_JSON = "https://fred.stlouisfed.org/graph/fredgraph.csv?id=WALCL&vintage_date=" + new Date().toISOString().slice(0,10);
          // Try three approaches in order
          let walclRows = null;

          // Approach 1: FRED direct JSON endpoint (works on some networks)
          try {
            const r = await fetch("https://fred.stlouisfed.org/graph/fredgraph.csv?id=WALCL", {
              headers: { "Accept": "text/plain" }, mode: "cors"
            });
            if (r.ok) {
              const txt = await r.text();
              const rows = txt.trim().split("\n").slice(1)
                .map(row => { const [d,v]=row.split(","); return {date:new Date(d), val:parseFloat(v)/1e6}; })
                .filter(r => !isNaN(r.val));
              if (rows.length > 10) { walclRows = rows.slice(-60); }
            }
          } catch(e1) { /* CORS blocked — try next */ }

          // Approach 2: codetabs proxy (free, no auth, works from Netlify)
          if (!walclRows) {
            try {
              const r = await fetch("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent("https://fred.stlouisfed.org/graph/fredgraph.csv?id=WALCL"));
              if (r.ok) {
                const txt = await r.text();
                if (txt.includes(",") && !txt.includes("<")) {
                  const rows = txt.trim().split("\n").slice(1)
                    .map(row => { const [d,v]=row.split(","); return {date:new Date(d), val:parseFloat(v)/1e6}; })
                    .filter(r => !isNaN(r.val));
                  if (rows.length > 10) walclRows = rows.slice(-60);
                }
              }
            } catch(e2) { /* try next */ }
          }

          // Approach 3: Use sheet WALCL value to construct a synthetic single point
          // Chart won't show history but won't break either
          if (!walclRows) throw new Error("WALCL unavailable — CORS blocked by all proxies. Chart requires a direct connection to FRED.");

          const btcRes = await fetch(BTC_URL);
          if (!btcRes.ok) throw new Error("Binance BTC fetch failed");
          const btcJson   = await btcRes.json();
          const btcPrices = btcJson.map(k => ({ date: new Date(k[0]), price: parseFloat(k[4]) }));
          setChartData({ walcl: walclRows, btc: btcPrices });
        } catch(e) { setError(e.message); }
        setLoading(false);
      }, []);
      useEffect(() => {
        if (!chartData || !canvasRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        const { walcl, btc } = chartData;
        const LAG_MS = lagWeeks * 7 * 24 * 3600 * 1000;
        const walclShifted = walcl.map(r => ({ x: new Date(r.date.getTime() + LAG_MS), y: r.val }));
        const btcPoints = btc.map(r => ({ x: r.date, y: r.price }));
        const ctx = canvasRef.current.getContext("2d");
        chartRef.current = new window.Chart(ctx, {
          type: "line",
          data: { datasets: [
            { label: `Fed Balance Sheet (+${lagWeeks}w lead)`, data: walclShifted, borderColor: "#79c6ff", backgroundColor: "#79c6ff18", borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: "yLiq", fill: true },
            { label: "BTC Price (log)", data: btcPoints, borderColor: "#f0b453", backgroundColor: "transparent", borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: "yBTC" },
          ]},
          options: { responsive: true, maintainAspectRatio: false, interaction: { mode: "index", intersect: false },
            plugins: { legend: { labels: { color: "#8b949e", font: { family: mono, size: 11 } } }, tooltip: { backgroundColor: "#161b22", borderColor: "#30363d", borderWidth: 1, titleColor: "#e6edf3", bodyColor: "#8b949e", callbacks: { title: items => new Date(items[0].parsed.x).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" }), label: item => item.datasetIndex === 0 ? ` Liquidity: $${item.parsed.y.toFixed(2)}T` : ` BTC: $${Math.round(item.parsed.y).toLocaleString()}` } } },
            scales: { x: { type: "time", time: { unit: "month", displayFormats: { month: "MMM yy" } }, grid: { color: "#30363d44" }, ticks: { color: "#8b949e", font: { family: mono, size: 10 }, maxRotation: 0 } }, yLiq: { type: "linear", position: "left", grid: { color: "#30363d44" }, ticks: { color: "#79c6ff", font: { family: mono, size: 10 }, callback: v => "$" + v.toFixed(1) + "T" }, title: { display: true, text: "Fed Balance Sheet ($T)", color: "#79c6ff", font: { size: 10 } } }, yBTC: { type: "logarithmic", position: "right", grid: { drawOnChartArea: false }, ticks: { color: "#f0b453", font: { family: mono, size: 10 }, callback: v => "$" + (v >= 1000 ? Math.round(v/1000)+"k" : v) }, title: { display: true, text: "BTC Price (log)", color: "#f0b453", font: { size: 10 } } } }
          },
        });
      }, [chartData, lagWeeks]);
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden" }}>
          <div style={{ padding: "12px 16px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontFamily: mono, fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em" }}>Liquidity vs BTC</span>
              <span style={{ fontFamily: mono, fontSize: 9, color: C.chartBlue, background: C.chartBlue+"18", border:`1px solid ${C.chartBlue}44`, borderRadius: 3, padding: "1px 6px" }}>WALCL shifted +{lagWeeks}w</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontFamily: mono, fontSize: 10, color: C.muted }}>Lag:</span>
                {[8,10,12,14].map(w => <button key={w} onClick={() => setLagWeeks(w)} style={{ fontFamily: mono, fontSize: 10, padding: "3px 8px", borderRadius: 4, border: "none", cursor: "pointer", background: lagWeeks === w ? C.chartBlue : C.border, color: lagWeeks === w ? "#0d1117" : C.muted }}>{w}w</button>)}
              </div>
              <button onClick={fetchChartData} disabled={loading} style={{ fontFamily: mono, fontSize: 10, padding: "4px 12px", borderRadius: 4, border: "none", background: loading ? C.border : C.blue, color: "#0d1117", cursor: "pointer", opacity: loading ? 0.7 : 1 }}>{loading ? "Loading..." : "Load Chart"}</button>
            </div>
          </div>
          <div style={{ padding: "12px 16px" }}>
            {error && <div style={{ fontFamily: mono, fontSize: 11, color: C.red, padding: "20px 0" }}>✗ {error}</div>}
            {!chartData && !loading && !error && <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, padding: "40px 0", textAlign: "center" }}>Click <span style={{ color: C.blue }}>Load Chart</span> to fetch WALCL + BTC data</div>}
            {(chartData || loading) && (
              <div style={{ position: "relative", height: 340 }}>
                {loading && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: mono, fontSize: 11, color: C.muted }}>Fetching FRED + Binance...</div>}
                <canvas ref={canvasRef} style={{ display: loading ? "none" : "block" }} />
              </div>
            )}
            {chartData && !loading && <div style={{ marginTop: 8, fontFamily: mono, fontSize: 10, color: C.muted, lineHeight: 1.8 }}><span style={{ color: C.chartBlue }}>━</span> Fed Balance Sheet (WALCL) shifted {lagWeeks} weeks forward &nbsp;·&nbsp; <span style={{ color: C.amber }}>━</span> BTC price log scale &nbsp;·&nbsp; Sources: FRED · Binance</div>}
          </div>
        </div>
      );
    }

    // ── PATTERNS TAB ──────────────────────────────────────────────────────
    function candleSVG(name, w, h) {
      const n = (name || "").toLowerCase();
      const W = w, H = h, mx = W / 2;
      const green = "#3fb950", red = "#f85149", gray = "#8b949e";
      let shapes = "";
      if (n.includes("hammer") && !n.includes("shooting") && !n.includes("inverted")) {
        shapes = `<line x1="${mx}" y1="8" x2="${mx}" y2="${H-8}" stroke="${green}" stroke-width="1.2"/>
        <rect x="${mx-5}" y="${H*0.15}" width="10" height="${H*0.25}" fill="${green}" rx="1"/>`;
      } else if (n.includes("shooting star") || n.includes("inverted hammer")) {
        shapes = `<line x1="${mx}" y1="6" x2="${mx}" y2="${H-8}" stroke="${red}" stroke-width="1.2"/>
        <rect x="${mx-5}" y="${H*0.58}" width="10" height="${H*0.24}" fill="${red}" rx="1"/>`;
      } else if (n.includes("bullish engulfing")) {
        shapes = `<line x1="${mx-9}" y1="18" x2="${mx-9}" y2="${H-18}" stroke="${red}" stroke-width="1.2"/>
        <rect x="${mx-14}" y="${H*0.35}" width="10" height="${H*0.3}" fill="${red}" rx="1"/>
        <line x1="${mx+9}" y1="10" x2="${mx+9}" y2="${H-10}" stroke="${green}" stroke-width="1.2"/>
        <rect x="${mx+4}" y="${H*0.22}" width="10" height="${H*0.54}" fill="${green}" rx="1"/>`;
      } else if (n.includes("bearish engulfing")) {
        shapes = `<line x1="${mx-9}" y1="18" x2="${mx-9}" y2="${H-18}" stroke="${green}" stroke-width="1.2"/>
        <rect x="${mx-14}" y="${H*0.35}" width="10" height="${H*0.3}" fill="${green}" rx="1"/>
        <line x1="${mx+9}" y1="10" x2="${mx+9}" y2="${H-10}" stroke="${red}" stroke-width="1.2"/>
        <rect x="${mx+4}" y="${H*0.22}" width="10" height="${H*0.54}" fill="${red}" rx="1"/>`;
      } else if (n.includes("morning star")) {
        shapes = `<line x1="${mx-16}" y1="12" x2="${mx-16}" y2="${H-12}" stroke="${red}" stroke-width="1.2"/>
        <rect x="${mx-21}" y="${H*0.2}" width="10" height="${H*0.4}" fill="${red}" rx="1"/>
        <line x1="${mx}" y1="${H*0.38}" x2="${mx}" y2="${H*0.62}" stroke="${gray}" stroke-width="1.2"/>
        <rect x="${mx-4}" y="${H*0.44}" width="8" height="${H*0.12}" fill="${gray}" rx="1"/>
        <line x1="${mx+16}" y1="12" x2="${mx+16}" y2="${H-12}" stroke="${green}" stroke-width="1.2"/>
        <rect x="${mx+11}" y="${H*0.25}" width="10" height="${H*0.42}" fill="${green}" rx="1"/>`;
      } else if (n.includes("evening star")) {
        shapes = `<line x1="${mx-16}" y1="12" x2="${mx-16}" y2="${H-12}" stroke="${green}" stroke-width="1.2"/>
        <rect x="${mx-21}" y="${H*0.2}" width="10" height="${H*0.4}" fill="${green}" rx="1"/>
        <line x1="${mx}" y1="${H*0.38}" x2="${mx}" y2="${H*0.62}" stroke="${gray}" stroke-width="1.2"/>
        <rect x="${mx-4}" y="${H*0.44}" width="8" height="${H*0.12}" fill="${gray}" rx="1"/>
        <line x1="${mx+16}" y1="12" x2="${mx+16}" y2="${H-12}" stroke="${red}" stroke-width="1.2"/>
        <rect x="${mx+11}" y="${H*0.25}" width="10" height="${H*0.42}" fill="${red}" rx="1"/>`;
      } else if (n.includes("three white")) {
        [-14,0,14].forEach((dx,i) => { shapes += `<line x1="${mx+dx}" y1="${8+i*3}" x2="${mx+dx}" y2="${H-8}" stroke="${green}" stroke-width="1.2"/><rect x="${mx+dx-5}" y="${12+i*3}" width="10" height="${H*0.48-i*3}" fill="${green}" rx="1"/>`; });
      } else if (n.includes("three black")) {
        [-14,0,14].forEach((dx,i) => { shapes += `<line x1="${mx+dx}" y1="8" x2="${mx+dx}" y2="${H-8+i*3}" stroke="${red}" stroke-width="1.2"/><rect x="${mx+dx-5}" y="12" width="10" height="${H*0.48+i*3}" fill="${red}" rx="1"/>`; });
      } else if (n.includes("doji")) {
        shapes = `<line x1="${mx}" y1="8" x2="${mx}" y2="${H-8}" stroke="${gray}" stroke-width="1.2"/>
        <rect x="${mx-8}" y="${H/2-2}" width="16" height="4" fill="${gray}" rx="1"/>`;
      } else if (n.includes("harami")) {
        shapes = `<line x1="${mx-8}" y1="10" x2="${mx-8}" y2="${H-10}" stroke="${red}" stroke-width="1.2"/>
        <rect x="${mx-13}" y="${H*0.2}" width="10" height="${H*0.6}" fill="${red}" rx="1"/>
        <line x1="${mx+8}" y1="${H*0.34}" x2="${mx+8}" y2="${H*0.66}" stroke="${green}" stroke-width="1.2"/>
        <rect x="${mx+3}" y="${H*0.37}" width="10" height="${H*0.26}" fill="${green}" rx="1"/>`;
      } else if (n.includes("inside bar")) {
        shapes = `<line x1="${mx-10}" y1="10" x2="${mx-10}" y2="${H-10}" stroke="${green}" stroke-width="1.2"/>
        <rect x="${mx-15}" y="${H*0.2}" width="10" height="${H*0.6}" fill="${green}" rx="1"/>
        <line x1="${mx+10}" y1="${H*0.3}" x2="${mx+10}" y2="${H*0.7}" stroke="${gray}" stroke-width="1.2"/>
        <rect x="${mx+5}" y="${H*0.35}" width="10" height="${H*0.3}" fill="${gray}" rx="1"/>`;
      } else if (n.includes("pin bar")) {
        shapes = `<line x1="${mx}" y1="6" x2="${mx}" y2="${H-6}" stroke="${green}" stroke-width="1.2"/>
        <rect x="${mx-5}" y="${H*0.55}" width="10" height="${H*0.2}" fill="${green}" rx="1"/>`;
      } else {
        shapes = `<line x1="${mx}" y1="10" x2="${mx}" y2="${H-10}" stroke="${green}" stroke-width="1.2"/>
        <rect x="${mx-6}" y="${H*0.3}" width="12" height="${H*0.4}" fill="${green}" rx="1"/>`;
      }
      return <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} xmlns="http://www.w3.org/2000/svg" dangerouslySetInnerHTML={{ __html: shapes }} />;
    }

    // ── Pattern Scanner v2 — 7-filter weighted conviction engine ─────────────
    // ── Scoring engine v2 — recalibrated scale ───────────────────────────────
    // Design principle: 100 = theoretically perfect, practically unreachable.
    // Best real-world signals land 75–87. 90+ requires every single factor perfect.
    // This gives scores like 79, 83, 71 — meaningful differentiation vs old 100/100/100.
    //
    // Architecture:
    //   Base score  = pattern win rate remapped to 38–52 (not 62–78)
    //   7 filters   = max +35 total (not +90), each worth less individually
    //   Cycle align = ±8 pts — biggest single modifier, silent
    //   Theoretical max: 52 + 35 + 8 = 95 (requires perfect everything)
    //   Realistic strong signal: ~75–85
    //   100 = essentially impossible in practice

    const FILTER_WEIGHTS = {
      volume:     { pass: 7,  fail: -5,  label: "Volume Conviction",  tip: "Weekly vol > 120% of 10-week avg" },
      trend:      { pass: 7,  fail: -6,  label: "Trend Alignment",    tip: "Price above 20d + 20-month MA" },
      atr:        { pass: 5,  fail: -5,  label: "ATR Body Filter",    tip: "Candle body > 1.5× weekly ATR" },
      divergence: { pass: 9,  fail: 0,   label: "RSI Divergence",     tip: "Price/RSI divergence confirmed — rarest, highest value" },
      liquidity:  { pass: 6,  fail: -7,  label: "Liquidity Regime",   tip: "Net liquidity trending with signal direction" },
      weekClose:  { pass: 3,  fail: -10, label: "Weekly Close Rule",  tip: "Pattern confirmed after weekly candle close" },
      extension:  { pass: 4,  fail: -5,  label: "Extension Score",    tip: "Price within 25% of 20-week SMA — not overextended" },
    };

    // Base win rates remapped: old 62–78 → new 38–52
    // This leaves meaningful room above 52 for filters and cycle to push score up
    const BASE_CONVICTION_MAP = {
      "Morning Star":52,        "Evening Star":51,
      "Three White Soldiers":50,"Three Black Crows":49,
      "Bullish Engulfing":48,   "Bearish Engulfing":47,
      "Hammer":46,              "Shooting Star":45,
      "Pin Bar":44,             "Inside Bar":42,
      "Bullish Harami":41,      "Doji":38,
    };

    // Historical win rate for display (unchanged — shown on card)
    const HISTORICAL_WR = {
      "Morning Star":78,"Evening Star":77,"Three White Soldiers":76,"Three Black Crows":75,
      "Bullish Engulfing":74,"Bearish Engulfing":73,"Hammer":72,"Shooting Star":71,
      "Pin Bar":70,"Inside Bar":68,"Bullish Harami":65,"Doji":62,
    };

    // ── Business cycle detector ─────────────────────────────────────────────
    // Uses live sheet data. Silent — folds into score without displaying phase.
    // Phase → which assets benefit:
    //   expansion:    crypto, semis, tech, small caps, growth
    //   late-cycle:   energy, gold, materials — growth fades
    //   contraction:  gold, bonds, defensives — risk assets punished
    //   recovery:     crypto, ARKX, growth lead — energy lags
    function detectCyclePhase(sd) {
      const ism      = parseFloat(sd.ism?.value);
      const vix      = parseFloat(sd.vix?.value);
      const walclChg = parseFloat(sd.walcl?.change);
      const spread   = parseFloat(sd.spread?.value);  // 10Y-2Y yield spread
      const dxyChg   = parseFloat(sd.dxy?.change);
      const fgVal    = parseFloat(sd.fg?.value);

      // Score each phase 0-4 (higher = stronger match)
      let scores = { expansion:0, lateCycle:0, contraction:0, recovery:0 };

      // ISM Manufacturing PMI
      if (!isNaN(ism)) {
        if (ism >= 53)       scores.expansion  += 2;
        else if (ism >= 50)  scores.expansion  += 1;
        else if (ism >= 47)  scores.lateCycle  += 1;
        else                 scores.contraction+= 2;
      }
      // VIX
      if (!isNaN(vix)) {
        if (vix < 15)        scores.expansion  += 1;
        else if (vix < 20)   scores.expansion  += 0.5;
        else if (vix < 30)   scores.lateCycle  += 1;
        else                 scores.contraction+= 2;
      }
      // Fed balance sheet
      if (!isNaN(walclChg)) {
        if (walclChg > 0.5)  { scores.expansion += 1; scores.recovery += 1; }
        else if (walclChg < -0.5) scores.contraction += 1;
      }
      // Yield curve (inverted = late cycle / contraction)
      if (!isNaN(spread)) {
        if (spread > 0.5)    scores.expansion  += 1;
        else if (spread > 0) scores.lateCycle  += 1;
        else                 { scores.lateCycle += 1; scores.contraction += 1; }
      }
      // DXY (strong dollar = late cycle / contraction)
      if (!isNaN(dxyChg)) {
        if (dxyChg < -0.3)   { scores.expansion += 0.5; scores.recovery += 1; }
        else if (dxyChg > 0.3) { scores.lateCycle += 0.5; scores.contraction += 0.5; }
      }
      // Fear & Greed (extreme fear → recovery signal)
      if (!isNaN(fgVal)) {
        if (fgVal < 20)      scores.recovery   += 1.5;
        else if (fgVal > 75) scores.lateCycle  += 1;
      }

      // Pick highest scoring phase
      const phase = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
      return phase;
    }

    // ── Cycle-adjusted sector bias ──────────────────────────────────────────
    // Returns adjustment pts for a given ticker + direction in current cycle phase.
    // Positive = cycle tailwind, Negative = cycle headwind.
    function cycleAdjustment(ticker, direction, phase) {
      const isBull = direction === "bull";
      const CYCLE_BIAS = {
        expansion: {
          bull: ["BTC","ETH","SUI","QQQ","SMH","mkt_SMH","mkt_QQQ","PLTR","SMCI","IWM","mkt_IWM","ARKX","mkt_ARKX","RKLB","JOBY"],
          bear: ["GLD","mkt_XLE","USO","UNG"],
        },
        lateCycle: {
          bull: ["GLD","mkt_GLD","XLE","mkt_XLE","USO","UNG"],
          bear: ["BTC","ETH","SUI","QQQ","mkt_QQQ","PLTR","SMCI"],
        },
        contraction: {
          bull: ["GLD","USO"],
          bear: ["BTC","ETH","SUI","RKLB","JOBY","PLTR","SMCI","SMH","mkt_SMH","mkt_QQQ","IWM","mkt_IWM","ARKX","mkt_ARKX"],
        },
        recovery: {
          bull: ["BTC","ETH","SUI","ARKX","mkt_ARKX","RKLB","JOBY","IWM","mkt_IWM","GLD"],
          bear: ["USO","UNG","XLE","mkt_XLE"],
        },
      };
      const bias = CYCLE_BIAS[phase] || CYCLE_BIAS.expansion;
      const t    = (ticker || "").toUpperCase();
      if (isBull  && bias.bull.includes(t)) return  8;   // strong tailwind
      if (!isBull && bias.bear.includes(t)) return  8;   // shorting a headwind asset
      if (isBull  && bias.bear.includes(t)) return -8;   // fighting the cycle
      if (!isBull && bias.bull.includes(t)) return -8;   // shorting a tailwind asset
      return 0; // neutral
    }

    // ── Tier labels — recalibrated for new scale ────────────────────────────
    // Old: 85+ = HIGH, 70+ = ELEVATED, 55+ = MODERATE
    // New: tighter — genuine differentiation across 45-90 range
    function convTier(score) {
      if (score >= 80) return { label:"HIGH CONVICTION", color:"#3fb950" };
      if (score >= 68) return { label:"ELEVATED",        color:"#58a6ff" };
      if (score >= 55) return { label:"MODERATE",        color:"#f0b453" };
      return                  { label:"LOW — SKIP",      color:"#f85149" };
    }

    function getLiquidityRegime(sd) {
      const walclChg = sd.walcl?.change, tgaChg = sd.tga?.change;
      if (walclChg == null) return { regime:"unknown", bullish:null, label:"Liquidity unknown" };
      const expanding = parseFloat(walclChg) > 0;
      const tgaShrink = tgaChg != null && parseFloat(tgaChg) < 0;
      if (expanding && tgaShrink) return { regime:"expanding",  bullish:true,  label:"Net liq expanding ↑" };
      if (expanding)              return { regime:"mild-exp",   bullish:true,  label:"WALCL expanding ↑" };
      if (!expanding && tgaShrink) return { regime:"mixed",    bullish:null,  label:"Mixed signals →" };
      return                             { regime:"tightening", bullish:false, label:"Net liq tightening ↓" };
    }

    // ── Master scoring function ─────────────────────────────────────────────
    function scoreSignal(raw, liq, sd) {
      const base   = BASE_CONVICTION_MAP[raw.pattern] || 40;
      let   score  = base;
      const checks = {};
      const isBull = raw.direction === "bull";

      // F1 Volume Conviction
      const vr = parseFloat(raw.volumeRatio || 0);
      checks.volume = vr >= 1.20 ? "pass" : vr >= 1.0 ? "warn" : "fail";
      if (checks.volume === "pass")      score += FILTER_WEIGHTS.volume.pass;
      else if (checks.volume === "fail") score += FILTER_WEIGHTS.volume.fail;

      // F2 Trend Alignment
      const a20d = raw.confluence?.above20dMA === true;
      const a20m = raw.confluence?.above20mMA === true;
      if (isBull) checks.trend = (a20d && a20m) ? "pass" : a20d ? "warn" : "fail";
      else {
        const b20d = raw.confluence?.above20dMA === false;
        const b20m = raw.confluence?.above20mMA === false;
        checks.trend = (b20d && b20m) ? "pass" : b20d ? "warn" : "fail";
      }
      if (checks.trend === "pass")      score += FILTER_WEIGHTS.trend.pass;
      else if (checks.trend === "fail") score += FILTER_WEIGHTS.trend.fail;

      // F3 ATR Body Filter
      const ar = parseFloat(raw.atrBodyRatio || 0);
      checks.atr = ar >= 1.5 ? "pass" : ar >= 0.5 ? "warn" : "fail";
      if (checks.atr === "pass")      score += FILTER_WEIGHTS.atr.pass;
      else if (checks.atr === "fail") score += FILTER_WEIGHTS.atr.fail;

      // F4 RSI Divergence (bonus only — rarest signal, highest value)
      checks.divergence = raw.rsiDivergence === true ? "pass" : "na";
      if (checks.divergence === "pass") score += FILTER_WEIGHTS.divergence.pass;

      // F5 Liquidity Regime
      if (liq.bullish === null) checks.liquidity = "warn";
      else if ((isBull && liq.bullish) || (!isBull && !liq.bullish)) {
        checks.liquidity = "pass"; score += FILTER_WEIGHTS.liquidity.pass;
      } else { checks.liquidity = "fail"; score += FILTER_WEIGHTS.liquidity.fail; }

      // F6 Weekly Close Rule
      checks.weekClose = raw.patternAge === "confirmed" ? "pass"
                       : raw.patternAge === "forming"   ? "fail" : "warn";
      if (checks.weekClose === "pass")      score += FILTER_WEIGHTS.weekClose.pass;
      else if (checks.weekClose === "fail") score += FILTER_WEIGHTS.weekClose.fail;

      // F7 Extension Score
      const ext = Math.abs(parseFloat(raw.extensionPct || 0));
      checks.extension = ext <= 15 ? "pass" : ext <= 25 ? "warn" : "fail";
      if (checks.extension === "pass")      score += FILTER_WEIGHTS.extension.pass;
      else if (checks.extension === "fail") score += FILTER_WEIGHTS.extension.fail;

      // F8 Business Cycle Alignment (silent — no badge shown)
      // Detect phase from live sheet data, apply sector bias silently
      const phase       = detectCyclePhase(sd || {});
      const cycleAdj    = cycleAdjustment(raw.ticker, raw.direction, phase);
      score            += cycleAdj;

      // Hard ceiling at 91 — 100 is not achievable in real markets
      // This ensures a score of 83 genuinely means "strong" not "tied for best"
      score = Math.min(91, Math.max(0, Math.round(score)));

      return {
        score,
        checks,
        base,
        winRate: HISTORICAL_WR[raw.pattern] || 65,
        liquidityLabel: liq.label,
        cyclePhase: phase,
        cycleAdj,
      };
    }

    function FilterBadge({ status, label, tip, pts }) {
      const [hov, setHov] = useState(false);
      const cfg = { pass:{color:C.green,icon:"✓"}, warn:{color:C.amber,icon:"~"}, fail:{color:C.red,icon:"✗"}, na:{color:C.muted,icon:"—"} }[status] || {color:C.muted,icon:"—"};
      const ptStr = pts > 0 ? `+${pts}` : pts < 0 ? `${pts}` : "";
      return (
        <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} title={tip}
          style={{ display:"flex", alignItems:"center", gap:4, padding:"2px 7px", borderRadius:4, border:`0.5px solid ${cfg.color}33`, background:hov?cfg.color+"14":"transparent", cursor:"help", transition:"background 0.15s" }}>
          <span style={{ fontSize:10, color:cfg.color, fontFamily:mono, fontWeight:700 }}>{cfg.icon}</span>
          <span style={{ fontSize:10, color:C.muted, fontFamily:mono }}>{label}</span>
          {status !== "na" && ptStr && <span style={{ fontSize:9, color:pts>0?C.green:C.red, fontFamily:mono }}>{ptStr}</span>}
        </div>
      );
    }

    function ScoreRing({ score, tier }) {
      const r=22, cx=28, cy=28, circ=2*Math.PI*r, dash=(score/100)*circ;
      return (
        <svg width="56" height="56">
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth="4"/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={tier.color} strokeWidth="4"
            strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={circ*0.25} strokeLinecap="round"/>
          <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle"
            fill={tier.color} fontSize="10" fontFamily={mono} fontWeight="700">{score}</text>
        </svg>
      );
    }

    function ExtensionBar({ pct }) {
      const absPct = Math.abs(pct||0);
      const col = absPct<=15?C.green:absPct<=25?C.amber:C.red;
      const pctW = Math.min(100, absPct/40*100);
      const label = pct>0?`+${absPct.toFixed(1)}% above 20w SMA`:pct<0?`${pct.toFixed(1)}% below 20w SMA`:"At 20w SMA";
      return (
        <div style={{ marginTop:4 }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:mono, fontSize:9, color:C.muted, marginBottom:3 }}>
            <span>Extension from 20w SMA</span><span style={{color:col}}>{label}</span>
          </div>
          <div style={{ background:C.border, borderRadius:2, height:3, position:"relative" }}>
            <div style={{ width:`${pctW}%`, height:"100%", background:col, borderRadius:2 }}/>
            <div style={{ position:"absolute", left:"37.5%", top:-1, width:1, height:5, background:C.amber+"88" }}/>
            <div style={{ position:"absolute", left:"62.5%", top:-1, width:1, height:5, background:C.red+"88" }}/>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:mono, fontSize:8, color:C.muted+"66", marginTop:2 }}>
            <span>0</span><span style={{color:C.amber+"88"}}>15%</span><span style={{color:C.red+"88"}}>25%</span><span>40%+</span>
          </div>
        </div>
      );
    }

    function PatternScanner({ sheetData: sd }) {
      const [activeTF, setActiveTF]           = useState("weekly");
      const [activeAssets, setActiveAssets]   = useState(new Set(["BTC","ETH","SUI","RKLB","JOBY","PLTR","GLD","USO"]));

      const [scanning, setScanning]           = useState(false);
      const [scoredSignals, setScoredSignals] = useState([]);
      const [scanMeta, setScanMeta]           = useState(null);
      const [liqRegime, setLiqRegime]         = useState(null);
      const [coachText, setCoachText]         = useState({});
      const [coachLoading, setCoachLoading]   = useState(null);
      const [expandedIdx, setExpandedIdx]     = useState(null);
      const ASSETS = ["BTC","ETH","SUI","RKLB","JOBY","PLTR","GLD","USO","ARKX","SMH","XLE","SPY","QQQ","IWM"];
      const toggleAsset = (a) => setActiveAssets(prev => { const n=new Set(prev); if(n.has(a)){if(n.size>1)n.delete(a);}else n.add(a); return n; });

      const runScan = async () => {

        const liq = getLiquidityRegime(sd); setLiqRegime(liq);
        const tfLabel = activeTF==="both"?"weekly and monthly":activeTF;
        const assets  = [...activeAssets].join(", ");
        const today   = new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
        const liveCtx = [

          sd.dxy?`DXY:${sd.dxy.value}`:null, sd.fg?`F&G:${sd.fg.value}`:null,
          sd.walcl?`WALCL:${sd.walcl.value}(${sd.walcl.change>0?"+":""}${sd.walcl.change}%)`:null,
          sd.tga?`TGA:${sd.tga.value}`:null,
          sd.stock_RKLB?`RKLB:${sd.stock_RKLB.value}(${sd.stock_RKLB.change}%)`:null,
          sd.stock_JOBY?`JOBY:${sd.stock_JOBY.value}(${sd.stock_JOBY.change}%)`:null,
          sd.stock_PLTR?`PLTR:${sd.stock_PLTR.value}(${sd.stock_PLTR.change}%)`:null,
          sd.stock_GLD ?`GLD:${sd.stock_GLD.value}(${sd.stock_GLD.change}%)`:null,
          sd.stock_USO ?`USO:${sd.stock_USO.value}(${sd.stock_USO.change}%)`:null,
        ].filter(Boolean).join(" | ");
        const liqStatus = liq.regime==="expanding"?"EXPANDING (bullish backdrop)":liq.regime==="tightening"?"TIGHTENING (bearish backdrop)":"MIXED";
        const phase = detectCyclePhase(sd||{});
        const prompt = `You are an expert technical analyst specialising in HIGH WIN-RATE weekly and monthly candlestick patterns on trending industry leaders. Today: ${today}. Business cycle: ${phase.toUpperCase()} phase. Liquidity regime: ${liqStatus}.${liveCtx?` Live data: ${liveCtx}`:""}

Scan these assets on ${tfLabel} candles: ${assets}

IMPORTANT CONTEXT: We are in the ${phase.toUpperCase()} phase of the business cycle. Focus on assets that are trending leaders in this environment:

- CONTRACTION: favour gold (GLD), flag bearish patterns broadly, be very selective on bulls

Only flag patterns that fit the current cycle phase. A hammer on GLD in contraction = strong. A hammer on BTC in late-cycle = needs extra scrutiny.

4. atrBodyRatio: candle body size / weekly ATR (e.g. 1.8 = body is 1.8× ATR)

Only report signals where at least 4 of 7 filters are genuinely favourable. Empty array is valid.

Respond ONLY in valid JSON (no markdown):
{"scanDate":"","tf":"","signals":[{"ticker":"","assetName":"","pattern":"","direction":"bull|bear","timeframe":"Weekly|Monthly","patternAge":"confirmed|forming|1 candle old","rsiValue":42,"rsiDivergence":false,"volumeRatio":1.35,"atrBodyRatio":1.8,"extensionPct":8.5,"confluence":{"ma200":"bull|bear|na","above20dMA":true,"above20mMA":false,"rsi":"bull|bear|neutral"},"thesis":"2 sentences specific to this asset and setup","entryZone":"","stopLoss":"","target":"","keyLevel":"specific price level significance"}]}`;
        try {
          const res = await fetch(CLAUDE_API,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+getApiKey()},body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:2400,messages:[{role:"user",content:prompt}]})});
          const data = await res.json();
          if(data.error) throw new Error(data.error.message||JSON.stringify(data.error)); if(!data.choices||!data.choices[0]) throw new Error("No response from Groq — check your API key");
          const raw = (data.choices&&data.choices[0]&&data.choices[0].message.content||"").replace(/```json|```/g,"").trim();
          // Robustly extract JSON — Llama sometimes adds prose before/after the object
          const jsonMatch = raw.match(/\{[\s\S]*\}/);
          if (!jsonMatch) throw new Error("No JSON object found in response — model returned: " + raw.slice(0,120));
          const parsed = JSON.parse(jsonMatch[0]);
          const scored = (parsed.signals||[]).map(s=>({...s,...scoreSignal(s,liq,sd)})).sort((a,b)=>b.score-a.score);
          setScoredSignals(scored); setScanMeta({...parsed,count:scored.length});
        } catch(e) { setScanMeta({error:e.message}); }
        setScanning(false);
      };

      const askCoach = async (idx) => {
        const s = scoredSignals[idx]; if(!s) return;
        setCoachLoading(idx);
        const tier = convTier(s.score);
        const filterSummary = Object.entries(FILTER_WEIGHTS).map(([key,fw])=>{
          const st=s.checks?.[key]||"na"; const pts=st==="pass"?fw.pass:st==="fail"?fw.fail:0;
          return `${fw.label}: ${st.toUpperCase()} (${pts>0?"+":""}${pts}pts)`;
        }).join("; ");
        const prompt = `You are a patient trading coach for a complete beginner. Simple language only.
Signal: ${s.ticker} (${s.assetName}) — ${s.pattern} on ${s.timeframe}. ${s.direction==="bull"?"BULLISH (price expected UP)":"BEARISH (price expected DOWN)"}
Conviction score: ${s.score}/100 — ${tier.label}. Base win rate: ~${BASE_CONVICTION_MAP[s.pattern]||68}%
Filter results: ${filterSummary}
Liquidity: ${s.liquidityLabel}. RSI: ${s.rsiValue||"?"}${s.rsiDivergence?" (DIVERGENCE CONFIRMED)":""}.
Volume: ${s.volumeRatio?(s.volumeRatio*100-100).toFixed(0)+"% above 10-week avg":"unknown"}. Extension: ${s.extensionPct?(s.extensionPct>0?"+":"")+s.extensionPct+"% from 20w SMA":"unknown"}.
Entry: ${s.entryZone} | Stop: ${s.stopLoss} | Target: ${s.target}. Key level: ${s.keyLevel||"not specified"}.
Why: ${s.thesis}

Write coaching note with EXACT headers (no markdown, no other headers):
WHAT YOU'RE LOOKING AT
WHAT THE SCORE MEANS
THE FILTERS EXPLAINED
YOUR NUMBERS IN PLAIN ENGLISH${s.rsiDivergence?"\nWHY THE RSI DIVERGENCE MATTERS":""}
WHAT COULD KILL THIS TRADE
BEFORE YOU TOUCH THE BUY BUTTON

2-4 sentences each. Use £500 position example. Warm, honest, no hype.`;
        try {
          const res=await fetch(CLAUDE_API,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+getApiKey()},body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
          const d=await res.json(); if(d.error) throw new Error(d.error.message||JSON.stringify(d.error)); if(!d.choices||!d.choices[0]) throw new Error("No response from Groq — check your API key");
          const txt=(d.choices&&d.choices[0]&&d.choices[0].message.content||"").trim();
          setCoachText(prev=>({...prev,[idx]:txt})); setExpandedIdx(idx);
        } catch(e){ setCoachText(prev=>({...prev,[idx]:"⚠ "+e.message})); }
        setCoachLoading(null);
      };

      const formatCoach = (text) => {
        const HDRS=["WHAT YOU'RE LOOKING AT","WHAT THE SCORE MEANS","THE FILTERS EXPLAINED","YOUR NUMBERS IN PLAIN ENGLISH","WHY THE RSI DIVERGENCE MATTERS","WHAT COULD KILL THIS TRADE","BEFORE YOU TOUCH THE BUY BUTTON"];
        let h=text;

                          <div style={{ width: 100, height: 4, borderRadius: 2, background: C.border }}>

                          </div>
                          <span style={{ fontFamily: mono, fontSize: 10, color: C.muted }}>conviction {cv}%</span>
                          <span style={{ fontFamily: mono, fontSize: 10, padding: "2px 8px", borderRadius: 4, background: C.purple+"22", color: C.purple, border: `0.5px solid ${C.purple}44` }}>R:R {t.rrRatio || "—"}</span>
                        </div>
                        <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, lineHeight: 1.6, marginBottom: 8 }}>{t.thesis}</div>
                        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 6 }}>
                          {[["Entry",t.entryZone,C.green],["Stop",t.stopLoss,C.red],["T1",t.target1,C.chartBlue],["T2",t.target2,C.chartBlue]].map(([lbl,val,col]) => (
                            <div key={lbl}><div style={{ fontSize: 9, fontFamily: mono, color: C.muted, textTransform: "uppercase", letterSpacing: "0.06em" }}>{lbl}</div><div style={{ fontSize: 12, fontWeight: 700, color: col }}>{val || "—"}</div></div>
                          ))}
