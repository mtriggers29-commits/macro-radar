                    <div style={{ padding: "10px 16px 12px", borderTop: `1px solid ${C.border}` }}>
                      <button onClick={() => askTradeCoach(i)} disabled={tradeCoachLoading === i} style={{ fontFamily: mono, fontSize: 11, padding: "5px 14px", borderRadius: 6, border: `0.5px solid ${C.purple}55`, background: C.purple+"22", color: C.purple, cursor: "pointer" }}>
                        {tradeCoachLoading === i ? "⟳ Coach thinking..." : tradeCoach[i] ? "✦ Refresh Coach" : "✦ Coach — explain this to me"}
                      </button>
                      {tradeCoach[i] && (
                        <div style={{ marginTop: 10, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "12px 14px" }}>
                          {formatCoach(tradeCoach[i])}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
              <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, lineHeight: 1.7, padding: "8px 0" }}>
                For educational purposes only — not financial advice. Always use a stop loss. Verify price levels live before trading.
              </div>
            </div>
          )}

          {/* PATTERN LIBRARY */}
          {patternTab === "library" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, lineHeight: 1.7 }}>
                Highest win-rate patterns on weekly/monthly candles. Signals only fire when all three confluence factors are confirmed.
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(130px,1fr))", gap: 8 }}>
                {PATTERN_LIBRARY.map((p, i) => {
                  const dirCol = p.dir === "bull" ? C.green : p.dir === "bear" ? C.red : C.chartBlue;
                  return (
                    <div key={i} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 12px", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, cursor: "pointer", transition: "border-color 0.15s" }}
                      onMouseEnter={e => e.currentTarget.style.borderColor = C.border}
                      onMouseLeave={e => e.currentTarget.style.borderColor = C.border}>
                      {candleSVG(p.name, 50, 54)}
                      <div style={{ fontFamily: mono, fontSize: 10, color: C.text, textAlign: "center", lineHeight: 1.4 }}>{p.name}</div>
                      <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                        <span style={{ fontFamily: mono, fontSize: 9, padding: "1px 6px", borderRadius: 3, background: dirCol+"18", color: dirCol }}>{p.dir === "bull" ? "Bullish" : p.dir === "bear" ? "Bearish" : "Both"}</span>
                        <span style={{ fontFamily: mono, fontSize: 9, color: C.muted }}>~{p.wr}%</span>
                      </div>
                      <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, textAlign: "center" }}>{p.tf}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── TIPS ──────────────────────────────────────────────────────────────
    const TIPS = [
      { label: "ETH/BTC Rotation",  body: "Trigger at 0.040. Current ~0.024 — not triggered. Wait for ratio + BTC dominance falling." },
      { label: "Fear & Greed < 20", body: "Accumulation zone. Scale in BTC. Historical recoveries within 4–8 weeks." },
      { label: "Fear & Greed > 75", body: "Start trimming. Move 20–30% to stablecoins. Don't sell all — momentum can persist." },
      { label: "4+ Macro Red",      body: "Move majority to stablecoins. Re-enter when RRP rising + DXY falling + M2 expanding." },
      { label: "RRP Near Zero",     body: "Liquidity tank empty. Next leg up needs M2 expansion + Fed pivot. Watch WALCL weekly." },
      { label: "Global M2 Lag",     body: "BTC historically lags global M2 expansion by 10–12 weeks. M2 is a leading indicator." },
      { label: "TGA Drawdown",      body: "Treasury spending down TGA = liquidity flowing into banking system = mild bullish." },
      { label: "Crude Oil Spike",   body: "Energy spikes = inflation pressure = Fed stays hawkish = risk-off. Watch if WTI >$90." },
    ];

    // ── MAIN APP ──────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab]             = useState("macro");
      const [scanning, setScanning]   = useState(false);
      const [scanLog, setScanLog]     = useState([]);
      const [lastScan, setLastScan]   = useState(null);
      const [flash, setFlash]         = useState({});
      const [data, setData]           = useState({});
      const [catalysts, setCatalysts] = useState([]);
      const [aiSummary, setAiSummary] = useState(null);
      const [aiLoading, setAiLoading] = useState(false);
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [keyInput, setKeyInput]   = useState("");
      const [hasKey, setHasKey]       = useState(() => !!getApiKey());

      const addLog = useCallback((ok, source, note) => {
        setScanLog(prev => [{ ok, source, note, time: now() }, ...prev].slice(0, 50));
      }, []);

      const flashCards = useCallback((keys) => {
        const obj = {}; keys.forEach(k => obj[k] = true); setFlash(obj);
        setTimeout(() => setFlash({}), 2000);
      }, []);

      const runScan = useCallback(async () => {
        if (scanning) return;
        setScanning(true); setScanLog([]);
        addLog(true, "SCAN", "Fetching sheet CSV...");
        try {
          const res = await fetch(SHEET_CSV + `&cachebust=${Date.now()}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const text = await res.text();
          const parsed = parseCSV(text);
          const updates = {}, keys = [];
          for (const [k, sigFn] of Object.entries(SIGNAL_FN)) {
            if (parsed[k]) {
              updates[k] = { ...parsed[k], signal: sigFn(parsed[k]) };
              keys.push(k);
              addLog(true, k, `${parsed[k].value}${parsed[k].unit ? " "+parsed[k].unit : ""} · ${parsed[k].updatedAt || "no ts"}${parsed[k].stale ? " ⚠ STALE" : ""}`);
            } else { addLog(false, k, "Key not found in sheet"); }
          }
          setData(updates); flashCards(keys); setLastScan(now());
          addLog(true, "SCAN", `Complete — ${keys.length} metrics loaded ✓`);
        } catch(e) { addLog(false, "SCAN", `Sheet fetch failed — ${e.message}`); }

        try {
          addLog(true, "NEWS", "Fetching headlines...");
          const r2 = await fetch(CATALYST_CSV + `&cachebust=${Date.now()}`);
          if (!r2.ok) throw new Error(`HTTP ${r2.status}`);
          const t2 = await r2.text();
          const rows = t2.trim().split("\n").slice(1).map(line => {
            const cols = []; let cur = "", inQ = false;
            for (const ch of line) { if (ch === '"') { inQ = !inQ; } else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; } else cur += ch; }
            cols.push(cur.trim());
            return { title: cols[0], url: cols[1], source: cols[2], pubDate: cols[3], topic: cols[4] };
          }).filter(r => r.title && r.title.length > 5);
          setCatalysts(rows); setAiSummary(null);
          addLog(true, "NEWS", `${rows.length} headlines loaded ✓`);
        } catch(e) { addLog(false, "NEWS", `Headlines fetch failed — ${e.message}`); }

        setScanning(false);
      }, [scanning, addLog, flashCards]);

      const interpretCatalysts = useCallback(async () => {
        if (aiLoading || catalysts.length === 0) return;
        setAiLoading(true); setAiSummary(null);
        try {
          const headlines = catalysts.map((c, i) => `${i+1}. [${(c.topic||"news").toUpperCase()}] ${c.title} (${c.source})`).join("\n");
          const ctx = [data.y10,data.y2,data.spread,data.dxy,data.vix,data.cpi,data.ism,data.btc,data.dom,data.fg,data.funding].map((d,i) => { const keys=["y10","y2","spread","dxy","vix","cpi","ism","btc","dom","fg","funding"]; return d ? `${keys[i]}: ${d.value}` : null; }).filter(Boolean).join(" · ");
          const prompt = `You are a macro and crypto markets analyst. Live indicators: ${ctx}\n\nToday's top headlines:\n${headlines}\n\nWrite a concise 5-bullet analyst briefing:\n• Dominant macro theme and what it means for risk assets\n• Direct Bitcoin/crypto implication from the news\n• Key level or data point to watch this week\n• Regime signal: risk-on / risk-off / mixed — and why\n• One actionable takeaway for a BTC/ETH/SUI portfolio\n\nBe specific. Reference actual numbers. No generic statements. Max 2 sentences per bullet.`;
          const response = await fetch(CLAUDE_API, { method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+getApiKey()}, body: JSON.stringify({ model:"llama-3.3-70b-versatile", max_tokens:800, messages:[{role:"user",content:prompt}] }) });
          const d2 = await response.json();
          if(d2.error) throw new Error(d2.error.message||JSON.stringify(d2.error)); if(!d2.choices||!d2.choices[0]) throw new Error("No response from Groq — check your API key");
          const txt = (d2.choices&&d2.choices[0]&&d2.choices[0].message.content||"").trim();
          setAiSummary(txt || "No summary returned.");
        } catch(e) { setAiSummary("⚠ Interpret failed: " + e.message); }
        setAiLoading(false);
      }, [aiLoading, catalysts, data]);

      const d = data;
      const MACRO_SIGNAL_KEYS = new Set(["dxy","vix","m2","walcl","wti","natgas","y10","y2","fedfunds","cpi","spread","ism"]);
      const signals = Object.fromEntries(Object.entries(d).filter(([k]) => MACRO_SIGNAL_KEYS.has(k)).map(([k,v]) => [k, v?.signal]));
      const grid = { display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(190px,1fr))", gap: 12 };

      // ── Parse packed market data from sheet ─────────────────────────────────
      // Format: price|change|field3|field4|field5|field6|field7|field8
      const parseMkt = (raw) => {
        if (!raw || raw === "ERR") return null;
        const [price, change, f3, f4, f5, f6, f7, f8] = (raw || "").split("|");
        return { price, change: parseFloat(change), f3, f4, f5, f6, f7, f8 };
      };
      const parseBroad = (raw) => {
        // price|change|ma50pos|ma200pos|regime|voltrend|pos52w
        const p = parseMkt(raw); if (!p) return null;
        return { price: p.price, change: p.change, ma50pos: parseInt(p.f3), ma200pos: parseInt(p.f4), regime: p.f5, voltrend: parseFloat(p.f6), pos52w: parseFloat(p.f7) };
      };
      const parseSector = (raw) => {
        // price|change|rs4w|voltrend|leadership|pos52w|ma50pos|ma200pos
        const p = parseMkt(raw); if (!p) return null;
        return { price: p.price, change: p.change, rs4w: parseFloat(p.f3), voltrend: parseFloat(p.f4), leadership: p.f5, pos52w: parseFloat(p.f6), ma50pos: parseInt(p.f7), ma200pos: parseInt(p.f8) };
      };

      const spreadNum   = parseFloat(d.spread?.value);
      const spreadColor = spreadSignalColor(d.spread?.value);
      const vixZoneData = vixZone(d.vix?.value);
      const ismZoneData = ismZone(d.ism?.value, d.ism?.change);
      const spreadLabel = !d.spread?.value ? null : isNaN(spreadNum) ? null : spreadNum < 0 ? `▼ ${spreadNum.toFixed(2)}% — Inverted` : spreadNum < 0.5 ? `► ${spreadNum.toFixed(2)}% — Flat` : `▲ ${spreadNum.toFixed(2)}% — Normal`;
      const ffChange    = d.fedfunds?.change;
      const ffColor     = fedfundsSignalColor(ffChange);
      const ffLabel     = ffChange == null ? null : ffChange > 0 ? `▲ +${ffChange.toFixed(2)}% — Hike (bear)` : ffChange < 0 ? `▼ ${ffChange.toFixed(2)}% — Cut (bull)` : `► Unchanged`;
      const domZoneData = domZone(d.dom?.value);
      const fundingZoneData = fundingZone(d.funding?.value);
      const oiZoneData  = oiZone(d.oi?.value, d.oi?.change, d.btc?.change);
      const stabvolZoneData = stabvolZone(d.stabvol?.value, d.stabvol?.change);
      const toB = v => { if (!v) return null; const s = String(v), n = parseFloat(s.replace(/[^0-9.]/g,"")); if (isNaN(n)) return null; return s.includes("T") ? n*1000 : n; };
      const walclB = toB(d.walcl?.value), tgaB = toB(d.tga?.value), rrpB = toB(d.rrp?.value);
      const netliqB  = (walclB != null && tgaB != null && rrpB != null) ? +(walclB - tgaB - rrpB).toFixed(1) : null;
      const netliqVal = netliqB != null ? "$" + (netliqB / 1000).toFixed(2) + "T" : null;
      const netliqChg = d.walcl?.change != null ? parseFloat(d.walcl.change) : null;
      const netliqZoneData = netliqZone(netliqVal, netliqChg);

      const price    = parseFloat(d.sui?.value);
      const pp       = parseFloat(d.sui_pp?.value);
      const r1       = parseFloat(d.sui_r1?.value);
      const r2       = parseFloat(d.sui_r2?.value);
      const s1       = parseFloat(d.sui_s1?.value);
      const s2       = parseFloat(d.sui_s2?.value);
      const wh       = parseFloat(d.sui_wh?.value);
      const wl       = parseFloat(d.sui_wl?.value);
      const mh       = parseFloat(d.sui_mh?.value);
      const ml       = parseFloat(d.sui_ml?.value);
      const suiHigh  = parseFloat(d.sui_high?.value);
      const suiLow   = parseFloat(d.sui_low?.value);
      const btcPrice = parseFloat(String(d.btc?.value || "").replace(/[^0-9.]/g,""));
      const btcHigh  = parseFloat(d.btc_high?.value);
      const btcLow   = parseFloat(d.btc_low?.value);
      const btcPP    = parseFloat(d.btc_pp?.value);
      const btcR1    = parseFloat(d.btc_r1?.value);
      const btcR2    = parseFloat(d.btc_r2?.value);
      const btcS1    = parseFloat(d.btc_s1?.value);
      const btcS2    = parseFloat(d.btc_s2?.value);
      const btcWH    = parseFloat(d.btc_wh?.value);
      const btcWL    = parseFloat(d.btc_wl?.value);
      const btcMH    = parseFloat(d.btc_mh?.value);
      const btcML    = parseFloat(d.btc_ml?.value);

      const suiFundingZone = fundingZone(d.sui_funding?.value);
      const suiOIZone = oiZone(d.sui_oi?.value, d.sui_oi?.change, d.sui?.change);
      const rangeMin = isNaN(ml) ? 0 : ml, rangeMax = isNaN(mh) ? 0 : mh;
      const rangePct = (rangeMax > rangeMin && !isNaN(price)) ? Math.min(100, Math.max(0, ((price - rangeMin) / (rangeMax - rangeMin)) * 100)) : null;
      const lvlPct = v => (!isNaN(v) && rangeMax > rangeMin) ? Math.min(100, Math.max(0, ((v - rangeMin) / (rangeMax - rangeMin)) * 100)) : null;
      const priceZone = (!isNaN(price) && !isNaN(pp)) ? (price > r1 ? { label:"Above R1 — Bullish breakout",color:C.green} : price > pp ? {label:"Above PP — Bullish bias",color:C.chartBlue} : price > s1 ? {label:"Below PP — Bearish bias",color:C.amber} : {label:"Below S1 — Weak",color:C.red}) : null;

      const TABS = ["macro","markets","crypto","trading","patterns","catalysts","tips"];

      return (
        <div style={{ background: C.bg, minHeight: "100vh", paddingBottom: 40 }}>
          {/* API Key Modal */}
          {showKeyModal && (
            <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
              <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "28px 32px", width: "100%", maxWidth: 480 }}>
                <div style={{ fontFamily: sans, fontWeight: 700, fontSize: 16, color: C.text, marginBottom: 8 }}>Groq API Key (Free)</div>
                <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, lineHeight: 1.8, marginBottom: 20 }}>
                  Required for AI features: Pattern Scan, Top 5 Trades, Coach, Interpret.<br/>
                  Get a completely free key at <span style={{ color: C.blue }}>console.groq.com</span> — no card needed<br/>
                  Stored locally in your browser only — never sent anywhere except Anthropic.
                </div>
                <input
                  type="password"
                  placeholder="gsk_..."
                  value={keyInput}
                  onChange={e => setKeyInput(e.target.value)}
                  style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "10px 14px", fontFamily: mono, fontSize: 12, color: C.text, marginBottom: 16, outline: "none" }}
                />
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => {
                    if (keyInput.startsWith("gsk_")) { setApiKey(keyInput); setHasKey(true); setShowKeyModal(false); setKeyInput(""); }
                    else alert("Groq key should start with gsk_");
                  }} style={{ flex: 1, background: C.blue, color: "#0d1117", fontFamily: mono, fontWeight: 700, fontSize: 12, border: "none", borderRadius: 6, padding: "10px 0", cursor: "pointer" }}>Save Key</button>
                  {hasKey && <button onClick={() => { clearApiKey(); setHasKey(false); setShowKeyModal(false); }} style={{ background: C.red+"22", color: C.red, fontFamily: mono, fontSize: 11, border: `1px solid ${C.red}44`, borderRadius: 6, padding: "10px 16px", cursor: "pointer" }}>Remove</button>}
                  <button onClick={() => { setShowKeyModal(false); setKeyInput(""); }} style={{ background: C.border, color: C.muted, fontFamily: mono, fontSize: 11, border: "none", borderRadius: 6, padding: "10px 16px", cursor: "pointer" }}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* Header */}
          <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "14px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent, boxShadow: `0 0 8px ${C.accent}` }} />
              <span style={{ fontFamily: sans, fontWeight: 700, fontSize: 17, letterSpacing: "-0.3px" }}>MACRO RADAR</span>
              <span style={{ fontFamily: mono, fontSize: 10, color: C.muted, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 4, padding: "2px 8px" }}>v3.1</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              {lastScan && <span style={{ fontFamily: mono, fontSize: 11, color: C.muted }}>Last scan: {lastScan}</span>}
              <button onClick={() => { setKeyInput(getApiKey()); setShowKeyModal(true); }}
                style={{ background: hasKey ? C.green+"22" : C.amber+"22", color: hasKey ? C.green : C.amber, fontFamily: mono, fontSize: 11, border: `1px solid ${hasKey ? C.green : C.amber}44`, borderRadius: 6, padding: "7px 14px", cursor: "pointer" }}>
                {hasKey ? "✓ AI Key Set" : "⚠ Set AI Key"}
              </button>
              <button onClick={runScan} disabled={scanning} style={{ background: scanning ? C.border : C.blue, color: "#0d1117", fontFamily: mono, fontWeight: 700, fontSize: 12, border: "none", borderRadius: 6, padding: "8px 20px", letterSpacing: "0.05em", transition: "all 0.2s", opacity: scanning ? 0.7 : 1 }}>
                {scanning ? "⟳ SCANNING..." : "⚡ LIVE SCAN"}
              </button>
            </div>
          </div>

          <div style={{ padding: "16px 24px", maxWidth: 1200, margin: "0 auto" }}>
            <div style={{ marginBottom: 12 }}><SignalBar signals={signals} /></div>
            {scanLog.length > 0 && <div style={{ marginBottom: 16 }}><ScanLog log={scanLog} /></div>}

            {/* Tabs */}
            <div style={{ display: "flex", gap: 2, marginBottom: 20, borderBottom: `1px solid ${C.border}`, overflowX: "auto" }}>
              {TABS.map(t => (
                <button key={t} onClick={() => setTab(t)}
                  style={{ fontFamily: mono, fontSize: 12, textTransform: "uppercase", letterSpacing: "0.08em", padding: "10px 18px", border: "none", borderRadius: "6px 6px 0 0", background: tab === t ? C.surface : "transparent", color: tab === t ? C.text : C.muted, borderBottom: tab === t ? `2px solid ${t === "patterns" ? C.purple : C.blue}` : "2px solid transparent", transition: "all 0.15s", whiteSpace: "nowrap" }}>{t}</button>
              ))}
            </div>

            {/* ── MARKETS TAB ── */}
            {tab === "markets" && (() => {
              const spy  = parseBroad(d.mkt_SPY?.value);
              const qqq  = parseBroad(d.mkt_QQQ?.value);
              const iwm  = parseBroad(d.mkt_IWM?.value);
              const arkx = parseSector(d.mkt_ARKX?.value);
              const smh  = parseSector(d.mkt_SMH?.value);
              const xle  = parseSector(d.mkt_XLE?.value);
              const align = d.mkt_liq_align?.value || null;

              // ── Colour helpers ──────────────────────────────────────────
              const rCol  = (r) => r==="bull"?C.green:r==="bear"?C.red:C.amber;
              const chgCol= (n) => n>0?C.green:n<0?C.red:C.muted;
              const rsCol = (n) => n>2?C.green:n<-2?C.red:C.amber;
              const maBox = (pos, label) => {
                const col = pos===1?C.green:pos===-1?C.red:C.amber;
                return <span style={{fontFamily:mono,fontSize:10,padding:"1px 7px",borderRadius:3,background:col+"18",color:col,border:`0.5px solid ${col}44`}}>{pos===1?"↑":pos===-1?"↓":"→"} {label}</span>;
              };

              const alignCfg = {
                "aligned-bull":        { color:C.green,     icon:"▲", label:"Aligned Bullish",      sub:"Price + liquidity both rising — real momentum" },
                "aligned-bear":        { color:C.red,       icon:"▼", label:"Aligned Bearish",       sub:"Price + liquidity both falling — confirmed risk-off" },
                "diverging-caution":   { color:C.amber,     icon:"⚠", label:"Diverging — Caution",   sub:"Price rising but liquidity not backing it — fragile" },
                "lagging-opportunity": { color:C.chartBlue, icon:"◆", label:"Lagging — Watch",       sub:"Liquidity expanding but price hasn't moved yet" },
                "neutral":             { color:C.muted,     icon:"→", label:"Neutral",               sub:"No clear alignment" },
                "unknown":             { color:C.muted,     icon:"—", label:"Run scan",              sub:"Hit Live Scan to calculate" },
              }[align||"unknown"];

              // ── Single market row component ─────────────────────────────
              // One dense row per instrument — scannable in 1 second
              const MktRow = ({ label, ticker, data, isSector }) => {
                if (!data) return (
                  <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",borderBottom:`0.5px solid ${C.border}`}}>
                    <span style={{fontFamily:mono,fontSize:11,color:C.muted,minWidth:140}}>{label}</span>
                    <span style={{fontFamily:mono,fontSize:11,color:C.muted}}>— run scan</span>
                  </div>
                );

                const regime  = isSector ? null : data.regime;
                const rc      = regime ? rCol(regime) : null;
                const cc      = chgCol(data.change);
                const rs      = isSector ? data.rs4w : null;
                const rsc     = rs!=null ? rsCol(rs) : null;

                return (
                  <div style={{display:"flex",alignItems:"center",gap:0,padding:"11px 16px",borderBottom:`0.5px solid ${C.border}`,flexWrap:"wrap"}}>

                    {/* Name + ticker */}
                    <div style={{minWidth:150,flexShrink:0}}>
                      <div style={{fontFamily:sans,fontWeight:600,fontSize:13,color:C.text}}>{ticker}</div>
                      <div style={{fontFamily:mono,fontSize:10,color:C.muted}}>{label}</div>
                    </div>

                    {/* Price + change */}
                    <div style={{minWidth:130,flexShrink:0}}>
                      <div style={{fontFamily:mono,fontSize:16,fontWeight:700,color:C.text}}>{data.price}</div>
                      <div style={{fontFamily:mono,fontSize:11,color:cc}}>{data.change>0?"▲":"▼"} {Math.abs(data.change).toFixed(2)}% 1d</div>
                    </div>

                    {/* Regime OR RS4w — the one big signal */}
                    <div style={{minWidth:160,flexShrink:0}}>
                      {!isSector && regime && (
                        <span style={{fontFamily:mono,fontSize:12,fontWeight:700,color:rc,background:rc+"18",border:`0.5px solid ${rc}44`,borderRadius:4,padding:"3px 10px"}}>
                          {regime==="bull"?"↑ Uptrend":regime==="bear"?"↓ Downtrend":"→ Chop"}
                        </span>
                      )}
                      {isSector && rs!=null && (
                        <div>
                          <div style={{fontFamily:mono,fontSize:12,fontWeight:700,color:rsc}}>
                            {rs>0?"▲":rs<0?"▼":"→"} {rs>0?"+":""}{rs.toFixed(1)}% vs SPY
                          </div>
                          <div style={{fontFamily:mono,fontSize:10,color:C.muted}}>4-week relative strength</div>
                        </div>
                      )}
                    </div>

                    {/* MA position — compact badges */}
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",flex:1,minWidth:180}}>
                      {data.ma50pos  != null && maBox(data.ma50pos,  "50d MA")}
                      {data.ma200pos != null && maBox(data.ma200pos, "200d MA")}
                      {isSector && data.leadership && (
                        <span style={{fontFamily:mono,fontSize:10,padding:"1px 7px",borderRadius:3,
                          background:(data.leadership==="leading"?C.green:data.leadership==="lagging"?C.red:C.muted)+"18",
                          color:data.leadership==="leading"?C.green:data.leadership==="lagging"?C.red:C.muted,
                          border:`0.5px solid ${(data.leadership==="leading"?C.green:data.leadership==="lagging"?C.red:C.muted)}44`}}>
                          {data.leadership==="leading"?"★ Leading":data.leadership==="lagging"?"↓ Lagging":"Neutral"}
                        </span>
                      )}
                    </div>

                    {/* 52w position — rightmost, muted */}
                    {data.pos52w!=null && (
                      <div style={{fontFamily:mono,fontSize:10,color:data.pos52w>-5?C.green:data.pos52w>-15?C.amber:C.red,minWidth:110,textAlign:"right",flexShrink:0}}>
                        {Math.abs(data.pos52w).toFixed(1)}% from 52w high
                      </div>
                    )}
                  </div>
                );
              };

              return (
                <div style={{display:"flex",flexDirection:"column",gap:16}}>

                  {/* ── Alignment signal — single prominent banner ── */}
                  <div style={{background:alignCfg.color+"14",border:`1px solid ${alignCfg.color}44`,borderRadius:8,padding:"14px 20px",display:"flex",alignItems:"center",gap:14}}>
                    <span style={{fontFamily:sans,fontSize:22,color:alignCfg.color,fontWeight:700,minWidth:28}}>{alignCfg.icon}</span>
                    <div>
                      <div style={{fontFamily:sans,fontWeight:700,fontSize:15,color:alignCfg.color}}>{alignCfg.label}</div>
                      <div style={{fontFamily:mono,fontSize:11,color:C.muted,marginTop:2}}>{alignCfg.sub}</div>
                    </div>
                    <div style={{marginLeft:"auto",fontFamily:mono,fontSize:9,color:C.muted,textAlign:"right",textTransform:"uppercase",letterSpacing:"0.08em"}}>Liquidity ×<br/>Price Signal</div>
                  </div>

                  {/* ── Broad Market table ── */}
                  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
                    <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <span style={{fontFamily:mono,fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em"}}>Broad Market</span>
                      <span style={{fontFamily:mono,fontSize:9,color:C.muted}}>Price · Regime · MA position · Distance from 52w high</span>
                    </div>
                    <MktRow label="S&P 500"     ticker="SPY" data={spy} />
                    <MktRow label="Nasdaq 100"  ticker="QQQ" data={qqq} />
                    <MktRow label="Russell 2000" ticker="IWM" data={iwm} />
                  </div>

                  {/* ── Sector Leadership table ── */}
                  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
                    <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <span style={{fontFamily:mono,fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em"}}>Sector Leadership</span>
                      <span style={{fontFamily:mono,fontSize:9,color:C.muted}}>4-week RS vs SPY · MA position · Leader/Lagger status</span>
                    </div>
                    <MktRow label="Space & Drones" ticker="ARKX" data={arkx} isSector />
                    <MktRow label="Semis"           ticker="SMH"  data={smh}  isSector />
                    <MktRow label="Energy"          ticker="XLE"  data={xle}  isSector />
                  </div>

                  {/* ── Quick read legend ── */}
                  <div style={{display:"flex",gap:16,flexWrap:"wrap",padding:"2px 4px"}}>
                    {[
                      {col:C.green, text:"Green = bullish / leading / above MA"},
                      {col:C.red,   text:"Red = bearish / lagging / below MA"},
                      {col:C.amber, text:"Amber = chop / neutral"},
                      {col:C.muted, text:"RS = relative strength vs SPY over 4 weeks"},
                    ].map((l,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:5}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:l.col,flexShrink:0}}/>
                        <span style={{fontFamily:mono,fontSize:10,color:C.muted}}>{l.text}</span>
                      </div>
                    ))}
                  </div>

                </div>
              );
            })()}

            {/* ── MACRO ── */}
            {tab === "macro" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                <div><SectionLabel>Rates & Yields</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="DXY" value={d.dxy?.value} change={d.dxy?.change} source={d.dxy?.source} updatedAt={d.dxy?.updatedAt} stale={!d.dxy} flash={flash.dxy} invertSignal subtext="↓ Falling = risk-on" />
                    <MetricCard label="VIX" value={d.vix?.value} source={d.vix?.source} updatedAt={d.vix?.updatedAt} stale={!d.vix} flash={flash.vix} signalColor={vixZoneData.color} changeLabel={d.vix?.value != null ? vixZoneData.label : null} subtext={vixZoneData.subtext} />
                    <MetricCard label="10Y Yield" value={d.y10?.value} change={d.y10?.change} source={d.y10?.source} updatedAt={d.y10?.updatedAt} stale={!d.y10} flash={flash.y10} invertSignal unit={d.y10?.unit} />
                    <MetricCard label="2Y Yield" value={d.y2?.value} change={d.y2?.change} source={d.y2?.source} updatedAt={d.y2?.updatedAt} stale={!d.y2} flash={flash.y2} invertSignal unit={d.y2?.unit} />
                    <MetricCard label="Yield Curve" value={d.spread?.value} source={d.spread?.source} updatedAt={d.spread?.updatedAt} stale={!d.spread} flash={flash.spread} unit={d.spread?.unit} signalColor={spreadColor} changeLabel={spreadLabel} subtext="10Y−2Y · red = inverted" />
                    <MetricCard label="Fed Funds Rate" value={d.fedfunds?.value} change={d.fedfunds?.change} source={d.fedfunds?.source} updatedAt={d.fedfunds?.updatedAt} stale={!d.fedfunds} flash={flash.fedfunds} unit={d.fedfunds?.unit} signalColor={ffColor} changeLabel={ffLabel} subtext="↑ Hike = bear · ↓ Cut = bull" />
                  </div>
                </div>
                <div><SectionLabel>Liquidity Flows</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="Net Liquidity" value={netliqVal} source="WALCL−TGA−RRP" updatedAt={d.walcl?.updatedAt} stale={!d.walcl} signalColor={netliqZoneData.color} changeLabel={netliqVal != null ? netliqZoneData.label : null} subtext={netliqZoneData.subtext} />
                    <MetricCard label="Fed Balance Sheet" value={d.walcl?.value} change={d.walcl?.change} source={d.walcl?.source} updatedAt={d.walcl?.updatedAt} stale={!d.walcl} flash={flash.walcl} unit={d.walcl?.unit} subtext="↑ Expanding = QE signal" />
                    <MetricCard label="M2 Money Supply" value={d.m2?.value} change={d.m2?.change} source={d.m2?.source} updatedAt={d.m2?.updatedAt} stale={!d.m2} flash={flash.m2} unit={d.m2?.unit} subtext="BTC lags M2 ~10–12w" />
                  </div>
                </div>
                <div><SectionLabel>Economic Activity</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="ISM Manufacturing PMI" value={d.ism?.value} source={d.ism?.source} updatedAt={d.ism?.updatedAt} stale={!d.ism} flash={flash.ism} signalColor={ismZoneData.color} changeLabel={d.ism?.value != null ? ismZoneData.label : null} subtext={ismZoneData.subtext} />
                  </div>
                </div>
                <div><SectionLabel>Energy & Inflation</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="WTI Crude Oil" value={d.wti?.value} change={d.wti?.change} source={d.wti?.source} updatedAt={d.wti?.updatedAt} stale={!d.wti} flash={flash.wti} invertSignal subtext=">$90 = risk-off watch" />
                    <MetricCard label="Natural Gas" value={d.natgas?.value} change={d.natgas?.change} source={d.natgas?.source} updatedAt={d.natgas?.updatedAt} stale={!d.natgas} flash={flash.natgas} invertSignal />
                    <MetricCard label="CPI" value={d.cpi?.value} change={d.cpi?.change} source={d.cpi?.source} updatedAt={d.cpi?.updatedAt} stale={!d.cpi} flash={flash.cpi} invertSignal unit={d.cpi?.unit} subtext="YoY — lower = risk-on" />
                  </div>
                </div>
                <LiquidityChart />
              </div>
            )}

            {/* ── CRYPTO ── */}
            {tab === "crypto" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                <div><SectionLabel>Prices</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="BTC / USD" value={d.btc?.value} change={d.btc?.change} source={d.btc?.source} updatedAt={d.btc?.updatedAt} stale={!d.btc} flash={flash.btc} />
                    <MetricCard label="ETH / USD" value={d.eth?.value} change={d.eth?.change} source={d.eth?.source} updatedAt={d.eth?.updatedAt} stale={!d.eth} flash={flash.eth} />
                    <MetricCard label="Funding Rate" value={d.funding?.value} source={d.funding?.source} updatedAt={d.funding?.updatedAt} stale={!d.funding} flash={flash.funding} unit="%" signalColor={fundingZoneData.color} changeLabel={d.funding?.value != null ? fundingZoneData.label : null} subtext={fundingZoneData.subtext} />
                    <MetricCard label="Open Interest" value={d.oi?.value} source={d.oi?.source} updatedAt={d.oi?.updatedAt} stale={!d.oi} flash={flash.oi} signalColor={oiZoneData.color} changeLabel={d.oi?.value != null ? oiZoneData.label : null} subtext={oiZoneData.subtext} />
                    <MetricCard label="Stablecoin Volume" value={d.stabvol?.value} source={d.stabvol?.source} updatedAt={d.stabvol?.updatedAt} stale={!d.stabvol} flash={flash.stabvol} signalColor={stabvolZoneData.color} changeLabel={d.stabvol?.value != null ? stabvolZoneData.label : null} subtext={stabvolZoneData.subtext} />
                  </div>
                </div>
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px" }}>
                  <SectionLabel>BTC Dominance</SectionLabel>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 24, flexWrap: "wrap" }}>
                    <div>
                      <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, marginBottom: 4 }}>Current</div>
                      <div style={{ fontFamily: sans, fontSize: 36, fontWeight: 700, color: domZoneData.color }}>{d.dom?.value ? parseFloat(d.dom.value).toFixed(2) : "—"}<span style={{ fontSize: 18, marginLeft: 4 }}>%</span></div>
                      <div style={{ fontFamily: mono, fontSize: 12, color: domZoneData.color, marginTop: 4 }}>{domZoneData.label}</div>
                      <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginTop: 2 }}>{d.dom?.source || "—"} · {d.dom?.updatedAt || "not fetched"}</div>
                    </div>
                    <div style={{ flex: 1, minWidth: 220, paddingTop: 4 }}>
                      <DomZoneBar value={d.dom?.value} />
                    </div>
                  </div>
                </div>
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px" }}>
                  <SectionLabel>ETH / BTC Rotation Tracker</SectionLabel>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 24, flexWrap: "wrap" }}>
                    <div>
                      <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, marginBottom: 4 }}>Current Ratio</div>
                      <div style={{ fontFamily: sans, fontSize: 36, fontWeight: 700, color: parseFloat(d.ethbtc?.value) >= 0.040 ? C.green : C.text }}>{d.ethbtc?.value || "—"}</div>
                      <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginTop: 2 }}>{d.ethbtc?.source || "Sheet"} · {d.ethbtc?.updatedAt || "not fetched"}</div>
                    </div>
                    <div style={{ flex: 1, minWidth: 200, paddingTop: 4 }}>
                      <ETHBTCBar ratio={parseFloat(d.ethbtc?.value)} />
                    </div>
                  </div>
                </div>
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px" }}>
                  <SectionLabel>Sentiment</SectionLabel>
                  <div style={{ display: "flex", gap: 32, flexWrap: "wrap", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, marginBottom: 8 }}>Fear & Greed Index</div>
                      <FearGauge value={d.fg?.value != null ? parseFloat(d.fg.value) : null} />
                      <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginTop: 8, textAlign: "center" }}>{d.fg?.updatedAt ? `${d.fg.source} · ${d.fg.updatedAt}` : "Run scan to fetch"}</div>
                    </div>
                  </div>
                </div>
                <div><SectionLabel>ETF Flows (Daily)</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="BTC ETF Net Flow" value={d.btcetf?.value} source={d.btcetf?.source} updatedAt={d.btcetf?.updatedAt} stale={!d.btcetf} flash={flash.btcetf} signalColor={d.btcetf?.change != null ? (parseFloat(d.btcetf.change) >= 0 ? C.green : C.red) : C.muted} changeLabel={d.btcetf?.change != null ? (parseFloat(d.btcetf.change) >= 0 ? `▲ +${parseFloat(d.btcetf.change).toFixed(1)}M today` : `▼ ${parseFloat(d.btcetf.change).toFixed(1)}M today`) : null} subtext="5d total · today's flow below" />
                    <MetricCard label="ETH ETF Net Flow" value={d.ethetf?.value} source={d.ethetf?.source} updatedAt={d.ethetf?.updatedAt} stale={!d.ethetf} flash={flash.ethetf} signalColor={d.ethetf?.change != null ? (parseFloat(d.ethetf.change) >= 0 ? C.green : C.red) : C.muted} changeLabel={d.ethetf?.change != null ? (parseFloat(d.ethetf.change) >= 0 ? `▲ +${parseFloat(d.ethetf.change).toFixed(1)}M today` : `▼ ${parseFloat(d.ethetf.change).toFixed(1)}M today`) : null} subtext="5d total · today's flow below" />
                    <MetricCard label="SOL ETF Net Flow" value={d.soletf?.value} source={d.soletf?.source} updatedAt={d.soletf?.updatedAt} stale={!d.soletf} flash={flash.soletf} signalColor={d.soletf?.change != null ? (parseFloat(d.soletf.change) >= 0 ? C.green : C.red) : C.muted} changeLabel={d.soletf?.change != null ? (parseFloat(d.soletf.change) >= 0 ? `▲ +${parseFloat(d.soletf.change).toFixed(1)}M today` : `▼ ${parseFloat(d.soletf.change).toFixed(1)}M today`) : null} subtext="5d total · today's flow below" />
                  </div>
                </div>
              </div>
            )}

            {/* ── TRADING ── */}
            {tab === "trading" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <USSessionClock />
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px" }}>
                  <SectionLabel>Bitcoin (BTC)</SectionLabel>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(190px,1fr))", gap: 12, marginBottom: 16 }}>
                    <MetricCard label="BTC / USDT" value={d.btc?.value} change={d.btc?.change} source={d.btc?.source} updatedAt={d.btc?.updatedAt} stale={!d.btc} flash={flash.btc} />
                    <MetricCard label="BTC Funding Rate" value={d.funding?.value} source={d.funding?.source} updatedAt={d.funding?.updatedAt} stale={!d.funding} unit="%" signalColor={fundingZoneData.color} changeLabel={d.funding?.value != null ? fundingZoneData.label : null} subtext={fundingZoneData.subtext} />
                    <MetricCard label="BTC Open Interest" value={d.oi?.value} source={d.oi?.source} updatedAt={d.oi?.updatedAt} stale={!d.oi} signalColor={oiZoneData.color} changeLabel={d.oi?.value != null ? oiZoneData.label : null} subtext={oiZoneData.subtext} />
                    <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "14px 16px" }}>
                      <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.07em" }}>24H Range</div>
                      <RangeBar price={btcPrice} high={btcHigh} low={btcLow} label="BTC" />
                    </div>
                  </div>
                  {!isNaN(btcPP) && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 6, minWidth: 240 }}>
                      {[["R2",btcR2,C.green,"2nd resistance"],["R1",btcR1,C.chartBlue,"1st resistance"],["PP",btcPP,C.amber,"Pivot point"],["S1",btcS1,C.amber,"1st support"],["S2",btcS2,C.red,"2nd support"]].map(([lbl,val,col,note]) => !isNaN(val) && (
                        <div key={lbl} style={{ display:"flex", gap:10, alignItems:"center" }}>
                          <span style={{ fontFamily:mono, fontSize:10, color:col, minWidth:52 }}>{lbl}</span>
                          <span style={{ fontFamily:mono, fontSize:12, color:col }}>${val.toLocaleString()}</span>
                          {note && <span style={{ fontFamily:mono, fontSize:10, color:C.muted }}>{note}</span>}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px" }}>
                  <SectionLabel>Sui Network (SUI)</SectionLabel>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(190px,1fr))", gap: 12 }}>
                    <MetricCard label="SUI / USDT" value={d.sui?.value} change={d.sui?.change} source={d.sui?.source} updatedAt={d.sui?.updatedAt} stale={!d.sui} flash={flash.sui} />
                    <MetricCard label="SUI Funding Rate" value={d.sui_funding?.value} source={d.sui_funding?.source} updatedAt={d.sui_funding?.updatedAt} stale={!d.sui_funding} unit="%" signalColor={suiFundingZone.color} changeLabel={d.sui_funding?.value != null ? suiFundingZone.label : null} subtext={suiFundingZone.subtext} />
                    <MetricCard label="SUI Open Interest" value={d.sui_oi?.value} source={d.sui_oi?.source} updatedAt={d.sui_oi?.updatedAt} stale={!d.sui_oi} signalColor={suiOIZone.color} changeLabel={d.sui_oi?.value != null ? suiOIZone.label : null} subtext={suiOIZone.subtext} />
                    <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "14px 16px" }}>
                      <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.07em" }}>24H Range</div>
                      <RangeBar price={price} high={suiHigh} low={suiLow} label="SUI" />
                    </div>
                  </div>
                </div>
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden" }}>
                  <div style={{ padding: "12px 16px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontFamily: mono, fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.07em" }}>Liquidation Heatmap — SUI</span>
                    <a href="https://www.coinglass.com/LiquidationData/SUI" target="_blank" style={{ fontFamily: mono, fontSize: 10, color: C.blue, textDecoration: "none", background: C.blue+"18", border:`1px solid ${C.blue}44`, borderRadius: 4, padding: "3px 10px" }}>Open CoinGlass ↗</a>
                  </div>
                  <iframe src="https://www.coinglass.com/pro/futures/LiquidationHeatMap?symbol=SUI&interval=12" style={{ width:"100%", height:480, border:"none", display:"block", background:C.bg }} title="SUI Liquidation Heatmap" loading="lazy" />
                </div>
              </div>
            )}

            {/* ── PATTERNS (NEW TAB) ── */}
            {tab === "patterns" && <PatternsTab sheetData={d} />}

            {/* ── CATALYSTS ── */}
            {tab === "catalysts" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: aiSummary ? 14 : 0 }}>
                    <div>
                      <span style={{ fontFamily: sans, fontWeight: 600, fontSize: 13, color: C.text }}>AI Market Briefing</span>
                      <span style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginLeft: 10 }}>Claude · live headlines + your indicators</span>
                    </div>
                    <button onClick={interpretCatalysts} disabled={aiLoading || catalysts.length === 0}
                      style={{ background: aiLoading ? C.border : C.purple, color: "#0d1117", fontFamily: mono, fontWeight: 700, fontSize: 11, border: "none", borderRadius: 6, padding: "7px 16px", opacity: (aiLoading || catalysts.length === 0) ? 0.6 : 1, cursor: (aiLoading || catalysts.length === 0) ? "default" : "pointer" }}>
                      {aiLoading ? "⟳ INTERPRETING..." : "✦ INTERPRET"}
                    </button>
                  </div>
                  {aiSummary && <div style={{ fontFamily: mono, fontSize: 12, color: C.text, lineHeight: 1.9, borderTop: `1px solid ${C.border}`, paddingTop: 14, whiteSpace: "pre-wrap" }}>{aiSummary}</div>}
                  {catalysts.length === 0 && !aiSummary && <div style={{ fontFamily: mono, fontSize: 11, color: C.amber, marginTop: 10 }}>⚠ No headlines — hit ⚡ LIVE SCAN to load</div>}
                </div>
                {catalysts.length > 0 && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    <SectionLabel>Live Headlines · {catalysts.length} items</SectionLabel>
                    {catalysts.map((c, i) => {
                      const topicCol = { macro: C.blue, crypto: C.amber, risk: C.red }[c.topic] || C.muted;
                      let dateStr = c.pubDate;
                      try { dateStr = new Date(c.pubDate).toLocaleString("en-GB", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" }); } catch{}
                      return (
                        <a key={i} href={c.url} target="_blank" rel="noopener noreferrer" style={{ textDecoration:"none" }}>
                          <div onMouseEnter={e => e.currentTarget.style.background = C.hover} onMouseLeave={e => e.currentTarget.style.background = C.surface}
                            style={{ background: C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"11px 16px", display:"flex", alignItems:"flex-start", gap:12, transition:"background 0.15s", cursor:"pointer" }}>
                            <span style={{ fontFamily:mono, fontSize:10, color:topicCol, background:topicCol+"22", border:`1px solid ${topicCol}44`, borderRadius:3, padding:"2px 7px", textTransform:"uppercase", letterSpacing:"0.06em", flexShrink:0, marginTop:2 }}>{c.topic}</span>
                            <div style={{ flex:1, minWidth:0 }}>
                              <div style={{ fontFamily:sans, fontSize:13, color:C.text, fontWeight:500, lineHeight:1.5, marginBottom:2 }}>{c.title}</div>
                              <div style={{ fontFamily:mono, fontSize:10, color:C.muted }}>{c.source} · {dateStr}</div>
                            </div>
                            <span style={{ fontFamily:mono, fontSize:11, color:C.muted, flexShrink:0, paddingTop:2 }}>↗</span>
                          </div>
                        </a>
                      );
                    })}
                  </div>
                )}
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <SectionLabel>Scheduled Events & Macro Triggers</SectionLabel>
                  {[
                    { date:"2026-Q2", event:"Clarity Act — Senate Markup", impact:"bull", note:"Stablecoin yield dispute unresolved. Passage = major bullish catalyst", confidence:"Medium" },
                    { date:"2026-Q2", event:"Debt Ceiling Resolution", impact:"watch", note:"TGA drawdown = short-term liquidity injection", confidence:"Medium" },
                    { date:"2026-H1", event:"Fed Balance Sheet Pivot (QT→QE)", impact:"bull", note:"Biggest macro trigger. Watch WALCL weekly", confidence:"Low" },
                  ].map((c, i) => (
                    <div key={i} onMouseEnter={e => e.currentTarget.style.background = C.hover} onMouseLeave={e => e.currentTarget.style.background = C.surface}
                      style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"14px 18px", display:"flex", alignItems:"flex-start", gap:16, transition:"background 0.15s", flexWrap:"wrap" }}>
                      <div style={{ minWidth:90, fontFamily:mono, fontSize:12, color:C.blue, paddingTop:2 }}>{c.date}</div>
                      <div style={{ flex:1, minWidth:200 }}>
                        <div style={{ fontFamily:sans, fontWeight:600, fontSize:14, color:C.text, marginBottom:4 }}>{c.event}</div>
                        <div style={{ fontFamily:mono, fontSize:12, color:C.muted, lineHeight:1.6 }}>{c.note}</div>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 }}>
                        <Tag label={c.impact} />
                        <span style={{ fontFamily:mono, fontSize:10, color:C.muted }}>Confidence: {c.confidence}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── TIPS ── */}
            {tab === "tips" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <SectionLabel>Decision Rules & Playbook</SectionLabel>
                {TIPS.map((t, i) => (
                  <div key={i} onMouseEnter={e => e.currentTarget.style.background = C.hover} onMouseLeave={e => e.currentTarget.style.background = C.surface}
                    style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"14px 18px", display:"flex", alignItems:"flex-start", gap:14, transition:"background 0.15s" }}>
                    <div style={{ width:6, height:6, borderRadius:"50%", background:C.blue, marginTop:6, flexShrink:0 }} />
                    <div>
                      <div style={{ fontFamily:sans, fontWeight:600, fontSize:13, color:C.blue, marginBottom:4 }}>{t.label}</div>
                      <div style={{ fontFamily:mono, fontSize:12, color:C.muted, lineHeight:1.7 }}>{t.body}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
