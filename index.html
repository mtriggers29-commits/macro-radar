<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Macro Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    button { cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    const SHEET_ID  = "1hGTwlIhPwi12-vjqaA92umV2oFgjU9aa-ffCoFNUQS8";
    const SHEET_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=582118687`;

    const C = {
      bg: "#0d1117", surface: "#161b22", border: "#30363d",
      text: "#e6edf3", muted: "#8b949e", blue: "#58a6ff",
      red: "#f85149", green: "#3fb950", amber: "#f0b453",
      chartBlue: "#79c6ff", accent: "#00d4ff", hover: "#1f2937",
      purple: "#bc8cff",
    };
    const mono = "'JetBrains Mono', monospace";
    const sans = "'Inter', system-ui, sans-serif";

    function parseCSV(text) {
      const lines = text.trim().split("\n").slice(1);
      const out = {};
      for (const line of lines) {
        const cols = [];
        let cur = "", inQ = false;
        for (const ch of line) {
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
          else cur += ch;
        }
        cols.push(cur.trim());
        const [key, value, change, unit, source, updated_at] = cols;
        if (!key) continue;
        const chg = parseFloat(change);
        out[key] = {
          value: value || null,
          change: isNaN(chg) ? null : chg,
          unit: unit || "",
          source: source || "Sheet",
          updatedAt: updated_at || null,
          stale: isStale(updated_at),
        };
      }
      return out;
    }

    function isStale(ts) {
      if (!ts) return true;
      try { return Date.now() - new Date(ts).getTime() > 25 * 3600 * 1000; }
      catch { return true; }
    }

    function now() {
      return new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    const SIGNAL_FN = {
      dxy:      p => p.change < 0 ? "bull" : "bear",
      m2:       p => p.change > 0 ? "bull" : "bear",
      walcl:    p => p.change > 0 ? "bull" : "bear",
      wti:      p => p.change > 0 ? "bear" : "bull",
      natgas:   p => p.change > 0 ? "bear" : "bull",
      ethbtc:   p => parseFloat(p.value) >= 0.040 ? "bull" : "neutral",
      dom:      p => p.change < 0 ? "bull" : "neutral",
      btcetf:   p => parseFloat(p.value) > 0 ? "bull" : "bear",
      ethetf:   p => parseFloat(p.value) > 0 ? "bull" : "bear",
      funding:  p => {
        const v = parseFloat(p.value);
        if (isNaN(v))    return "neutral";
        if (v > 0.05)    return "bear";    // overheated longs — correction risk
        if (v > 0.01)    return "bull";    // healthy longs — bullish
        if (v > -0.01)   return "neutral"; // balanced
        if (v > -0.05)   return "bear";    // shorts dominant — bearish
        return "bull";                     // overheated shorts — short squeeze potential
      },
      btc:      p => p.change > 0 ? "bull" : "bear",
      eth:      p => p.change > 0 ? "bull" : "bear",
      fg:       p => parseFloat(p.value) < 20 ? "bull" : parseFloat(p.value) > 75 ? "bear" : "neutral",
      y10:      p => p.change > 0 ? "bear" : "bull",
      y2:       p => p.change > 0 ? "bear" : "bull",
      fedfunds: p => p.change > 0 ? "bear" : "bull",
      cpi:      p => p.change < 0 ? "bull" : p.change > 0 ? "bear" : "neutral",
      spread:   p => parseFloat(p.value) < 0 ? "bear" : "neutral",
      oi:       p => {
        // Signal resolved in oiZone() using price context — use change as proxy here
        const chg = p.change;
        if (chg == null || isNaN(chg)) return "neutral";
        if (chg > 0)  return "bull";
        return "bear";
      },
      stabvol:  p => {
        const chg = p.change;
        if (chg == null || isNaN(chg)) return "neutral";
        if (chg > 20)  return "neutral"; // extreme spike — ambiguous, use amber via zone
        if (chg > 5)   return "bull";    // active participation, dry powder building
        if (chg > -5)  return "neutral"; // routine variance
        return "bear";                   // declining activity, low participation
      },
      soletf:   p => parseFloat(p.value) > 0 ? "bull" : "bear",
      sui:      p => p.change > 0 ? "bull" : "bear",
      sui_funding: p => {
        const v = parseFloat(p.value);
        if (isNaN(v))    return "neutral";
        if (v > 0.05)    return "bear";
        if (v > 0.01)    return "bull";
        if (v > -0.01)   return "neutral";
        if (v > -0.05)   return "bear";
        return "bull";
      },
      sui_oi: p => {
        const chg = p.change;
        if (chg == null || isNaN(chg)) return "neutral";
        if (chg > 5)  return "bull";
        if (chg > -1) return "neutral";
        return "bear";
      },
    };

    const CATALYSTS = [
      { date: "2026-03-19", event: "FOMC Decision",                   impact: "bull",  note: "Rate cut odds ~12% — hold expected",                                         confidence: "High"   },
      { date: "2026-03-12", event: "CPI Print (Feb)",                 impact: "watch", note: "Hotter = yields up, risk-off pressure",                                       confidence: "High"   },
      { date: "2026-Q2",    event: "Clarity Act — Senate Markup",     impact: "bull",  note: "Stablecoin yield dispute unresolved. Passage = major bullish catalyst",        confidence: "Medium" },
      { date: "2026-Q2",    event: "Debt Ceiling Resolution",         impact: "watch", note: "TGA drawdown = short-term liquidity injection",                               confidence: "Medium" },
      { date: "2026-H1",    event: "Fed Balance Sheet Pivot (QT→QE)", impact: "bull",  note: "Biggest macro trigger. Watch WALCL weekly",                                   confidence: "Low"    },
      { date: "2026-03-28", event: "PCE Inflation (Feb)",             impact: "watch", note: "Fed's preferred gauge — key for pivot timing",                               confidence: "High"   },
    ];

    const TIPS = [
      { label: "ETH/BTC Rotation",  body: "Trigger at 0.040. Current ~0.024 — not triggered. Wait for ratio + BTC dominance falling." },
      { label: "Fear & Greed < 20", body: "Accumulation zone. Scale in BTC. Historical recoveries within 4–8 weeks." },
      { label: "Fear & Greed > 75", body: "Start trimming. Move 20–30% to stablecoins. Don't sell all — momentum can persist." },
      { label: "4+ Macro Red",      body: "Move majority to stablecoins. Re-enter when RRP rising + DXY falling + M2 expanding." },
      { label: "RRP Near Zero",     body: "Liquidity tank empty. Next leg up needs M2 expansion + Fed pivot. Watch WALCL weekly." },
      { label: "Global M2 Lag",     body: "BTC historically lags global M2 expansion by 10–12 weeks. M2 is a leading indicator." },
      { label: "TGA Drawdown",      body: "Treasury spending down TGA = liquidity flowing into banking system = mild bullish." },
      { label: "Crude Oil Spike",   body: "Energy spikes = inflation pressure = Fed stays hawkish = risk-off. Watch if WTI >$90." },
    ];

    // ── BTC Dominance zone logic ──────────────────────────────────────────
    // >60%      : BTC accumulation phase — alts underperform
    // 55%–60%   : Rotation starting — capital beginning to leave BTC
    // 50%–55%   : Altcoin season approaching
    // 40%–50%   : Confirmed altseason — optimal alt performance zone
    // <40%      : Euphoria / warning — market top risk
    function domZone(value) {
      const v = parseFloat(value);
      if (isNaN(v)) return { color: C.muted, label: "—", subtext: "↓ Falling = alt season" };
      if (v >= 60)  return { color: C.blue,     label: `► ${v.toFixed(2)}% — BTC Phase`,         subtext: "BTC dominant — hold BTC, avoid alts" };
      if (v >= 55)  return { color: C.amber,    label: `▼ ${v.toFixed(2)}% — Rotation Starting`, subtext: "Capital rotating → ETH/SOL/SUI" };
      if (v >= 50)  return { color: C.chartBlue,label: `▼ ${v.toFixed(2)}% — Alt Season Near`,   subtext: "Approaching confirmed altseason" };
      if (v >= 40)  return { color: C.green,    label: `▼ ${v.toFixed(2)}% — Alt Season ✓`,      subtext: "Optimal zone — broad alt rally" };
      return              { color: C.red,       label: `▼ ${v.toFixed(2)}% — Euphoria Zone`,      subtext: "⚠ Below 40% — market top risk" };
    }

    function Tag({ label }) {
      const colors = { bull: C.green, bear: C.red, watch: C.amber, neutral: C.muted };
      const col = colors[label] || C.muted;
      return (
        <span style={{ fontSize: 10, fontFamily: mono, color: col,
          background: col + "22", border: `1px solid ${col}44`,
          borderRadius: 3, padding: "1px 6px", textTransform: "uppercase", letterSpacing: "0.05em" }}>
          {label}
        </span>
      );
    }

    // signalColor  — overrides change-row color (for value-derived signals)
    // changeLabel  — replaces the auto "▲ x.xx% 24h" text with a custom string
    function MetricCard({ label, value, change, unit="", source, updatedAt, stale,
                          flash, invertSignal, subtext, signalColor, changeLabel }) {
      const [hov, setHov] = useState(false);
      const isPos = change > 0, isNeg = change < 0;

      let changeColor = invertSignal
        ? (isPos ? C.red : isNeg ? C.green : C.muted)
        : (isPos ? C.green : isNeg ? C.red : C.muted);
      if (signalColor) changeColor = signalColor;

      const hasChangeRow = change != null || changeLabel != null;

      return (
        <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ background: C.surface, border: `1px solid ${flash ? C.blue : C.border}`,
            borderRadius: 8, padding: "14px 16px", transition: "all 0.2s",
            transform: hov ? "scale(1.02)" : "scale(1)",
            boxShadow: flash ? `0 0 0 2px ${C.blue}44` : "none", minWidth: 0 }}>
          <div style={{ fontSize: 11, fontFamily: mono, color: C.muted, marginBottom: 6,
            display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ textTransform: "uppercase", letterSpacing: "0.07em" }}>{label}</span>
            {stale && <span style={{ color: C.amber, fontSize: 10 }}>⚠ STALE</span>}
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginBottom: 4 }}>
            <span style={{ fontSize: 26, fontFamily: sans, fontWeight: 700, color: C.text, letterSpacing: "-0.5px" }}>
              {value || <span style={{ color: C.muted, fontSize: 16 }}>—</span>}
            </span>
            {unit && <span style={{ fontSize: 13, fontFamily: mono, color: C.muted }}>{unit}</span>}
          </div>

          {hasChangeRow && (
            <div style={{ fontSize: 12, fontFamily: mono, color: changeColor }}>
              {changeLabel != null
                ? changeLabel
                : <>{isPos ? "▲" : isNeg ? "▼" : "—"} {Math.abs(change).toFixed(2)}%<span style={{ color: C.muted, marginLeft: 6, fontSize: 10 }}>24h</span></>
              }
            </div>
          )}

          {subtext && <div style={{ fontSize: 11, fontFamily: mono, color: C.muted, marginTop: 4 }}>{subtext}</div>}
          <div style={{ marginTop: 10, fontSize: 10, fontFamily: mono, display: "flex", justifyContent: "space-between" }}>
            <span style={{ color: C.muted + "99" }}>{source || "—"}</span>
            <span style={{ color: C.muted + "66" }}>{updatedAt || "—"}</span>
          </div>
        </div>
      );
    }

    // ── Yield Curve signal color ──────────────────────────────────────────
    function spreadSignalColor(value) {
      if (!value) return C.muted;
      const v = parseFloat(value);
      if (isNaN(v)) return C.muted;
      if (v < 0)    return C.red;
      if (v < 0.5)  return C.amber;
      return C.chartBlue;
    }

    // ── Fed Funds signal color ────────────────────────────────────────────
    function fedfundsSignalColor(change) {
      if (change == null) return C.muted;
      if (change > 0)     return C.red;
      if (change < 0)     return C.green;
      return C.chartBlue;
    }

    // ── Funding Rate 5-zone signal ────────────────────────────────────────
    // Zones (% per 8h):
    //  > +0.05%  Overheated Bull  — red    (crowded longs, long squeeze risk)
    //  +0.01 to +0.05  Bullish    — green  (healthy long bias)
    //  -0.01 to +0.01  Neutral    — blue   (balanced, low immediate risk)
    //  -0.05 to -0.01  Bearish    — red    (short bias dominant)
    //  < -0.05%  Overheated Bear  — amber  (extreme shorts, short squeeze potential)
    function fundingZone(value) {
      const v = parseFloat(value);
      if (isNaN(v) || value == null) return { color: C.muted, label: null, subtext: "Funding rate signal" };
      if (v > 0.05)  return { color: C.red,       label: `▲ ${v.toFixed(4)}% — Overheated Longs`,  subtext: "⚠ Long squeeze risk — crowded trade"       };
      if (v > 0.01)  return { color: C.green,      label: `▲ ${v.toFixed(4)}% — Bullish`,           subtext: "Longs paying · healthy long bias"           };
      if (v > -0.01) return { color: C.chartBlue,  label: `► ${v.toFixed(4)}% — Neutral`,           subtext: "Balanced market · low squeeze risk"         };
      if (v > -0.05) return { color: C.red,        label: `▼ ${v.toFixed(4)}% — Bearish`,           subtext: "Shorts dominant · bearish sentiment"        };
      return              { color: C.amber,       label: `▼ ${v.toFixed(4)}% — Overheated Shorts`, subtext: "⚠ Short squeeze potential — extreme fear"   };
    }

    // ── Open Interest 5-zone signal ───────────────────────────────────────
    // Signal is driven by the % change in OI (new capital in vs positions closing).
    // Rising OI = new contracts created = trend strengthening.
    // Falling OI = contracts closed = trend weakening / deleveraging.
    //
    //  > +5%    Strong inflow    — green  (significant new capital entering)
    //  +1 to +5% Building        — chartBlue (participation growing, healthy)
    //  -1 to +1% Flat            — chartBlue neutral (balanced, no signal)
    //  -5 to -1% Deleveraging    — amber  (positions closing, trend softening)
    //  < -5%    Sharp unwind     — red    (mass closing, potential reversal/flush)
    // ── Open Interest — Price × OI matrix ────────────────────────────────
    // OI change alone is ambiguous. The signal requires combining with price direction:
    //
    //  Price ↑ + OI ↑ → BULL   New money entering to buy. Trend strengthening.
    //  Price ↓ + OI ↑ → BEAR   New money entering to short. Downtrend strengthening.
    //  Price ↑ + OI ↓ → WARN   Shorts covering OR longs profit-taking. Trend weakening.
    //  Price ↓ + OI ↓ → BULL   Panic sellers / short covering. Potential bottom / reversal.
    //
    // priceChg = BTC 24h % change, oiChg = OI 24h % change
    function oiZone(oiValue, oiChg, priceChg) {
      const noData = oiChg == null || isNaN(parseFloat(oiChg)) || !oiValue;
      const noPrice = priceChg == null || isNaN(parseFloat(priceChg));
      if (noData) return { color: C.muted, label: null, subtext: "Price × OI = combined signal" };

      const oi  = parseFloat(oiChg);
      const oiUp   = oi  >= 0;
      const oiDown = oi  <  0;

      if (noPrice) {
        // No price data — fall back to OI direction only
        return oiUp
          ? { color: C.chartBlue, label: `▲ OI +${oi.toFixed(1)}% — Building`,    subtext: "OI rising · await price direction" }
          : { color: C.amber,     label: `▼ OI ${oi.toFixed(1)}% — Declining`,    subtext: "OI falling · positions closing"    };
      }

      const pr   = parseFloat(priceChg);
      const prUp = pr >= 0;

      if (prUp && oiUp)   return {
        color: C.green,
        label: `▲ Price +${pr.toFixed(1)}% · OI +${oi.toFixed(1)}% — BULLISH`,
        subtext: "New longs entering · uptrend strengthening"
      };
      if (!prUp && oiUp)  return {
        color: C.red,
        label: `▼ Price ${pr.toFixed(1)}% · OI +${oi.toFixed(1)}% — BEARISH`,
        subtext: "New shorts entering · downtrend strengthening"
      };
      if (prUp && oiDown) return {
        color: C.amber,
        label: `▲ Price +${pr.toFixed(1)}% · OI ${oi.toFixed(1)}% — WEAKENING`,
        subtext: "Shorts covering / profit-taking · trend losing conviction"
      };
      // prDown && oiDown
      return {
        color: C.chartBlue,
        label: `▼ Price ${pr.toFixed(1)}% · OI ${oi.toFixed(1)}% — BOTTOMING?`,
        subtext: "Panic selling or shorts covering · watch for reversal"
      };
    }

    // ── Stablecoin Volume 4-zone signal ───────────────────────────────────
    // Volume is a participation/activity signal, not purely directional.
    // A spike means capital is in motion but context determines if it's
    // risk-on accumulation or risk-off rotation — treat extreme spikes as caution.
    //
    //  > +20%   Extreme spike  — amber  (major capital in motion, ambiguous — check other signals)
    //  +5 to +20% Active       — green  (healthy participation, dry powder building)
    //  -5 to +5%  Normal       — blue   (routine variance, no signal)
    //  < -5%    Declining      — red    (low activity, complacency or capital already deployed)
    // ── Net Liquidity zone (WALCL − TGA − RRP) ───────────────────────────
    // Rising = more liquidity in system = bullish for risk assets
    // Falling = liquidity draining = bearish
    function netliqZone(value, change) {
      if (!value || change == null || isNaN(change)) return { color: C.muted, label: null, subtext: "WALCL − TGA − RRP" };
      const chg = parseFloat(change);
      if (chg > 1)   return { color: C.green,     label: `▲ +${chg.toFixed(1)}% — Expanding`,  subtext: "Liquidity rising · bullish for risk assets"  };
      if (chg > 0)   return { color: C.chartBlue, label: `▲ +${chg.toFixed(2)}% — Slight Rise`, subtext: "Mild liquidity expansion"                    };
      if (chg === 0) return { color: C.chartBlue, label: `► Unchanged`,                          subtext: "Flat liquidity · no strong signal"           };
      if (chg > -1)  return { color: C.amber,     label: `▼ ${chg.toFixed(2)}% — Slight Drain`, subtext: "Mild liquidity contraction · watch closely"  };
      return              { color: C.red,        label: `▼ ${chg.toFixed(1)}% — Contracting`,  subtext: "⚠ Liquidity draining · bearish for risk assets" };
    }

    function stabvolZone(value, change) {
      if (change == null || isNaN(change) || !value) return { color: C.muted, label: null, subtext: "24h USDT volume · activity signal" };
      const chg = parseFloat(change);
      if (chg > 20)  return { color: C.amber,     label: `▲ +${chg.toFixed(1)}% — Extreme Spike`,  subtext: "⚠ Major capital in motion · check other signals" };
      if (chg > 5)   return { color: C.green,     label: `▲ +${chg.toFixed(1)}% — Active`,         subtext: "Participation rising · dry powder building"      };
      if (chg > -5)  return { color: C.chartBlue, label: `► ${chg.toFixed(1)}% — Normal`,          subtext: "Routine activity · no strong signal"             };
      return              { color: C.red,        label: `▼ ${chg.toFixed(1)}% — Declining`,      subtext: "Low participation · complacency or fully deployed" };
    }

    function SectionLabel({ children }) {
      return (
        <div style={{ fontSize: 11, fontFamily: mono, color: C.muted, textTransform: "uppercase",
          letterSpacing: "0.1em", marginBottom: 10, paddingBottom: 6, borderBottom: `1px solid ${C.border}` }}>
          {children}
        </div>
      );
    }

    function SignalBar({ signals }) {
      const vals = Object.values(signals).filter(Boolean);
      const bulls = vals.filter(v => v === "bull").length;
      const bears = vals.filter(v => v === "bear").length;
      const total = vals.length || 1;
      const overall = bears >= 4 ? "DEFENSIVE" : bulls >= 5 ? "BULLISH" : "NEUTRAL";
      const col = overall === "DEFENSIVE" ? C.red : overall === "BULLISH" ? C.green : C.amber;
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8,
          padding: "12px 20px", display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: col, boxShadow: `0 0 6px ${col}88` }} />
            <span style={{ fontFamily: sans, fontWeight: 700, fontSize: 15, color: col }}>{overall}</span>
          </div>
          <div style={{ display: "flex", gap: 4, flex: 1, minWidth: 120 }}>
            {Array.from({ length: total }).map((_, i) => (
              <div key={i} style={{ flex: 1, height: 5, borderRadius: 3,
                background: i < bulls ? C.green : i < bulls + bears ? C.red : C.chartBlue + "55" }} />
            ))}
          </div>
          <span style={{ fontFamily: mono, fontSize: 11, color: C.muted }}>
            {bulls} bull · {bears} bear · {total - bulls - bears} neutral
          </span>
          {bears >= 4 && (
            <span style={{ fontFamily: mono, fontSize: 11, color: C.red,
              background: C.red + "18", border: `1px solid ${C.red}44`,
              borderRadius: 4, padding: "2px 8px" }}>⚠ 4+ RED — consider stables</span>
          )}
        </div>
      );
    }

    function ScanLog({ log }) {
      if (!log.length) return null;
      return (
        <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6,
          padding: "10px 14px", maxHeight: 160, overflowY: "auto" }}>
          {log.map((l, i) => (
            <div key={i} style={{ fontFamily: mono, fontSize: 11, lineHeight: 1.8, display: "flex", gap: 10 }}>
              <span style={{ color: l.ok ? C.green : C.red }}>{l.ok ? "✓" : "✗"}</span>
              <span style={{ color: C.muted }}>{l.time}</span>
              <span style={{ color: C.text }}>{l.source}</span>
              <span style={{ color: l.ok ? C.muted : C.red }}>{l.note}</span>
            </div>
          ))}
        </div>
      );
    }

    function FearGauge({ value }) {
      if (value == null) return <div style={{ color: C.muted, fontFamily: mono }}>— run scan</div>;
      const v = Math.max(0, Math.min(100, value));
      const col = v < 20 ? C.green : v < 40 ? C.chartBlue : v < 60 ? C.amber : v < 75 ? C.amber : C.red;
      const lbl = v < 20 ? "Extreme Fear" : v < 40 ? "Fear" : v < 60 ? "Neutral" : v < 75 ? "Greed" : "Extreme Greed";
      const angle = (v / 100) * 180 - 90;
      const r = 52, cx = 70, cy = 68;
      const rad = d => d * Math.PI / 180;
      const nx = cx + r * 0.75 * Math.cos(rad(angle - 90));
      const ny = cy + r * 0.75 * Math.sin(rad(angle - 90));
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
          <svg width="140" height="80" style={{ overflow: "visible" }}>
            {[C.red, C.amber, C.chartBlue, C.amber, C.red].map((c, i) => {
              const s = i * 36 - 90, e = s + 36;
              const sx = cx + r * Math.cos(rad(s)), sy = cy + r * Math.sin(rad(s));
              const ex = cx + r * Math.cos(rad(e)), ey = cy + r * Math.sin(rad(e));
              return <path key={i} d={`M${cx},${cy} L${sx},${sy} A${r},${r} 0 0,1 ${ex},${ey} Z`}
                fill={[C.red+"44",C.amber+"33",C.chartBlue+"33",C.amber+"33",C.red+"44"][i]} stroke="none" />;
            })}
            <line x1={cx} y1={cy} x2={nx} y2={ny} stroke={col} strokeWidth={2.5} strokeLinecap="round" />
            <circle cx={cx} cy={cy} r={4} fill={col} />
          </svg>
          <div style={{ fontFamily: sans, fontSize: 28, fontWeight: 700, color: col, marginTop: -8 }}>{v}</div>
          <div style={{ fontFamily: mono, fontSize: 11, color: col, marginTop: 2 }}>{lbl}</div>
        </div>
      );
    }

    // ── BTC Dominance Zone Bar ────────────────────────────────────────────
    function DomZoneBar({ value }) {
      const v = parseFloat(value);
      if (isNaN(v)) return null;
      const zones = [
        { label: ">60%",     min: 60, max: 80,  color: C.blue,      desc: "BTC Phase"  },
        { label: "55–60%",   min: 55, max: 60,  color: C.amber,     desc: "Rotation"   },
        { label: "50–55%",   min: 50, max: 55,  color: C.chartBlue, desc: "Alt Near"   },
        { label: "40–50%",   min: 40, max: 50,  color: C.green,     desc: "Altseason"  },
        { label: "<40%",     min: 0,  max: 40,  color: C.red,       desc: "Euphoria"   },
      ];
      // The 5 labels (40, 50, 55, 60, 80) are evenly spaced at 0/25/50/75/100%
      // of the bar width. Map value to the same scale so needle aligns with labels.
      let pct;
      if      (v >= 80) pct = 100;
      else if (v >= 60) pct = 75 + ((v - 60) / 20) * 25;
      else if (v >= 55) pct = 50 + ((v - 55) / 5)  * 25;
      else if (v >= 50) pct = 25 + ((v - 50) / 5)  * 25;
      else if (v >= 40) pct = 0  + ((v - 40) / 10) * 25;
      else              pct = 0;
      return (
        <div style={{ marginTop: 10 }}>
          {/* Zone legend pills */}
          <div style={{ display: "flex", gap: 4, marginBottom: 6, flexWrap: "wrap" }}>
            {zones.map(z => {
              const active = v >= z.min && v < z.max;
              return (
                <span key={z.label} style={{
                  fontFamily: mono, fontSize: 9, padding: "1px 6px", borderRadius: 3,
                  color: z.color,
                  background: active ? z.color + "33" : z.color + "11",
                  border: `1px solid ${active ? z.color + "88" : z.color + "22"}`,
                  fontWeight: active ? 700 : 400,
                }}>{z.label}</span>
              );
            })}
          </div>
          {/* Gradient bar with needle */}
          <div style={{ position: "relative", height: 6, borderRadius: 4,
            background: `linear-gradient(to left, ${C.blue}, ${C.amber}, ${C.chartBlue}, ${C.green}, ${C.red})` }}>
            <div style={{
              position: "absolute", top: -4, left: `${pct}%`,
              transform: "translateX(-50%)",
              width: 3, height: 14, borderRadius: 2,
              background: C.text, boxShadow: `0 0 4px #000`,
            }} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between",
            fontFamily: mono, fontSize: 9, color: C.muted, marginTop: 3 }}>
            <span style={{ color: C.red }}>40%</span>
            <span style={{ color: C.green }}>50%</span>
            <span style={{ color: C.chartBlue }}>55%</span>
            <span style={{ color: C.amber }}>60%</span>
            <span style={{ color: C.blue }}>80%+</span>
          </div>
        </div>
      );
    }

    function ETHBTCBar({ ratio }) {
      const target = 0.040;
      const pct = Math.min(100, ((ratio || 0) / target) * 100);
      // bar always light blue
      return (
        <div style={{ marginTop: 6 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: mono, fontSize: 10, color: C.muted, marginBottom: 4 }}>
            <span>0.000</span><span style={{ color: C.amber }}>TARGET 0.040</span>
          </div>
          <div style={{ background: C.border, borderRadius: 4, height: 6, position: "relative" }}>
            <div style={{ width: `${pct}%`, background: C.chartBlue, borderRadius: 4, height: "100%", transition: "width 0.5s" }} />
            <div style={{ position: "absolute", right: 0, top: -3, width: 2, height: 12, background: C.amber, borderRadius: 1 }} />
          </div>
          <div style={{ fontFamily: mono, fontSize: 10, color: "#1a6fa8", marginTop: 4 }}>
            {ratio ? ratio.toFixed(4) : "—"} / 0.040 — {pct.toFixed(0)}% to trigger
          </div>
        </div>
      );
    }

    function App() {
      const [tab, setTab]           = useState("macro");
      const [scanning, setScanning] = useState(false);
      const [scanLog, setScanLog]   = useState([]);
      const [lastScan, setLastScan] = useState(null);
      const [flash, setFlash]       = useState({});
      const [data, setData]         = useState({});

      const addLog = useCallback((ok, source, note) => {
        setScanLog(prev => [{ ok, source, note, time: now() }, ...prev].slice(0, 50));
      }, []);

      const flashCards = useCallback((keys) => {
        const obj = {};
        keys.forEach(k => obj[k] = true);
        setFlash(obj);
        setTimeout(() => setFlash({}), 2000);
      }, []);

      const runScan = useCallback(async () => {
        if (scanning) return;
        setScanning(true);
        setScanLog([]);
        addLog(true, "SCAN", "Fetching sheet CSV...");
        try {
          const res = await fetch(SHEET_CSV + `&cachebust=${Date.now()}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const text = await res.text();
          const parsed = parseCSV(text);
          const updates = {}, keys = [];
          for (const [k, sigFn] of Object.entries(SIGNAL_FN)) {
            if (parsed[k]) {
              updates[k] = { ...parsed[k], signal: sigFn(parsed[k]) };
              keys.push(k);
              addLog(true, k, `${parsed[k].value}${parsed[k].unit ? " "+parsed[k].unit : ""} · ${parsed[k].updatedAt || "no ts"}${parsed[k].stale ? " ⚠ STALE" : ""}`);
            } else {
              addLog(false, k, "Key not found in sheet — check Apps Script ran");
            }
          }
          setData(updates);
          flashCards(keys);
          setLastScan(now());
          addLog(true, "SCAN", `Complete — ${keys.length} metrics loaded ✓`);
        } catch(e) {
          addLog(false, "SCAN", `Sheet fetch failed — ${e.message}`);
        }
        setScanning(false);
      }, [scanning, addLog, flashCards]);

      const d = data;
      const signals = Object.fromEntries(Object.entries(d).map(([k, v]) => [k, v?.signal]));
      const grid = { display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(190px,1fr))", gap: 12 };

      // ── Yield Curve derived signal ────────────────────────────────────
      const spreadNum   = parseFloat(d.spread?.value);
      const spreadColor = spreadSignalColor(d.spread?.value);
      const spreadLabel = !d.spread?.value ? null
        : isNaN(spreadNum) ? null
        : spreadNum < 0   ? `▼ ${spreadNum.toFixed(2)}% — Inverted`
        : spreadNum < 0.5 ? `► ${spreadNum.toFixed(2)}% — Flat`
        :                   `▲ ${spreadNum.toFixed(2)}% — Normal`;

      // ── Fed Funds derived signal ──────────────────────────────────────
      const ffChange = d.fedfunds?.change;
      const ffColor  = fedfundsSignalColor(ffChange);
      const ffLabel  = ffChange == null ? null
        : ffChange > 0 ? `▲ +${ffChange.toFixed(2)}% — Hike (bear)`
        : ffChange < 0 ? `▼ ${ffChange.toFixed(2)}% — Cut (bull)`
        :                `► Unchanged`;

      // ── BTC Dominance derived signal ──────────────────────────────────
      const domZoneData = domZone(d.dom?.value);

      // ── Funding Rate derived signal ───────────────────────────────────
      const fundingZoneData = fundingZone(d.funding?.value);

      // ── Open Interest derived signal (Price × OI matrix) ─────────────
      const oiZoneData = oiZone(d.oi?.value, d.oi?.change, d.btc?.change);

      // ── Stablecoin Volume derived signal ──────────────────────────────
      const stabvolZoneData = stabvolZone(d.stabvol?.value, d.stabvol?.change);

      // ── Net Liquidity = WALCL − TGA − RRP ────────────────────────────
      // WALCL: stored as "6.65T" → convert to $B = 6650
      // TGA:   stored as "$838.2B" → strip $ = 838.2
      // RRP:   stored as "0.43" with unit "B" → 0.43
      const toB = v => {
        if (!v) return null;
        const s = String(v);
        const n = parseFloat(s.replace(/[^0-9.]/g, ""));
        if (isNaN(n)) return null;
        if (s.includes("T")) return n * 1000;  // trillions → billions
        return n;                               // already in billions
      };
      const walclB   = toB(d.walcl?.value);   // e.g. 6650
      const tgaB     = toB(d.tga?.value);     // e.g. 838.2
      const rrpB     = toB(d.rrp?.value);     // e.g. 0.43
      const netliqB  = (walclB != null && tgaB != null && rrpB != null)
        ? +(walclB - tgaB - rrpB).toFixed(1) : null;
      const netliqVal = netliqB != null ? "$" + (netliqB / 1000).toFixed(2) + "T" : null;
      // % change: WALCL raw change is in $M, convert to % of WALCL value
      const walclChgM  = d.walcl?.change != null ? parseFloat(d.walcl.change) : null;
      const netliqChg  = (walclChgM != null && walclB != null && walclB > 0)
        ? +((walclChgM / 1000) / walclB * 100).toFixed(2)  // $M change → % of $B total
        : null;
      const netliqZoneData = netliqZone(netliqVal, netliqChg);

      return (
        <div style={{ background: C.bg, minHeight: "100vh", paddingBottom: 40 }}>
          {/* Header */}
          <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`,
            padding: "14px 24px", display: "flex", alignItems: "center",
            justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent, boxShadow: `0 0 8px ${C.accent}` }} />
              <span style={{ fontFamily: sans, fontWeight: 700, fontSize: 17, letterSpacing: "-0.3px" }}>MACRO RADAR</span>
              <span style={{ fontFamily: mono, fontSize: 10, color: C.muted,
                background: C.bg, border: `1px solid ${C.border}`, borderRadius: 4, padding: "2px 8px" }}>v2.5</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              {lastScan && <span style={{ fontFamily: mono, fontSize: 11, color: C.muted }}>Last scan: {lastScan}</span>}
              <button onClick={runScan} disabled={scanning}
                style={{ background: scanning ? C.border : C.blue, color: "#0d1117",
                  fontFamily: mono, fontWeight: 700, fontSize: 12, border: "none",
                  borderRadius: 6, padding: "8px 20px", letterSpacing: "0.05em",
                  transition: "all 0.2s", opacity: scanning ? 0.7 : 1 }}>
                {scanning ? "⟳ SCANNING..." : "⚡ LIVE SCAN"}
              </button>
            </div>
          </div>

          <div style={{ padding: "16px 24px", maxWidth: 1200, margin: "0 auto" }}>
            <div style={{ marginBottom: 12 }}><SignalBar signals={signals} /></div>
            {scanLog.length > 0 && <div style={{ marginBottom: 16 }}><ScanLog log={scanLog} /></div>}

            {/* Tabs */}
            <div style={{ display: "flex", gap: 2, marginBottom: 20, borderBottom: `1px solid ${C.border}` }}>
              {["macro","crypto","trading","catalysts","tips"].map(t => (
                <button key={t} onClick={() => setTab(t)}
                  style={{ fontFamily: mono, fontSize: 12, textTransform: "uppercase", letterSpacing: "0.08em",
                    padding: "10px 20px", border: "none", borderRadius: "6px 6px 0 0",
                    background: tab === t ? C.surface : "transparent",
                    color: tab === t ? C.text : C.muted,
                    borderBottom: tab === t ? `2px solid ${C.blue}` : "2px solid transparent",
                    transition: "all 0.15s" }}>{t}</button>
              ))}
            </div>

            {/* MACRO */}
            {tab === "macro" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                <div>
                  <SectionLabel>Rates & Yields</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="DXY"
                      value={d.dxy?.value}        change={d.dxy?.change}
                      source={d.dxy?.source}      updatedAt={d.dxy?.updatedAt}
                      stale={!d.dxy}              flash={flash.dxy}
                      invertSignal                subtext="↓ Falling = risk-on" />
                    <MetricCard label="10Y Yield"
                      value={d.y10?.value}        change={d.y10?.change}
                      source={d.y10?.source}      updatedAt={d.y10?.updatedAt}
                      stale={!d.y10}              flash={flash.y10}
                      invertSignal                unit={d.y10?.unit} />
                    <MetricCard label="2Y Yield"
                      value={d.y2?.value}         change={d.y2?.change}
                      source={d.y2?.source}       updatedAt={d.y2?.updatedAt}
                      stale={!d.y2}              flash={flash.y2}
                      invertSignal                unit={d.y2?.unit} />
                    <MetricCard label="Yield Curve"
                      value={d.spread?.value}
                      source={d.spread?.source}   updatedAt={d.spread?.updatedAt}
                      stale={!d.spread}           flash={flash.spread}
                      unit={d.spread?.unit}
                      signalColor={spreadColor}
                      changeLabel={spreadLabel}
                      subtext="10Y−2Y · red = inverted" />
                    <MetricCard label="Fed Funds Rate"
                      value={d.fedfunds?.value}   change={d.fedfunds?.change}
                      source={d.fedfunds?.source} updatedAt={d.fedfunds?.updatedAt}
                      stale={!d.fedfunds}         flash={flash.fedfunds}
                      unit={d.fedfunds?.unit}
                      signalColor={ffColor}
                      changeLabel={ffLabel}
                      subtext="↑ Hike = bear · ↓ Cut = bull" />
                  </div>
                </div>
                <div>
                  <SectionLabel>Liquidity Flows</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="Net Liquidity"
                      value={netliqVal}
                      source="WALCL−TGA−RRP"  updatedAt={d.walcl?.updatedAt}
                      stale={!d.walcl || !d.tga || !d.rrp}
                      signalColor={netliqZoneData.color}
                      changeLabel={netliqVal != null ? netliqZoneData.label : null}
                      subtext={netliqZoneData.subtext} />
                    <MetricCard label="Fed Balance Sheet"
                      value={d.walcl?.value}      change={d.walcl?.change}
                      source={d.walcl?.source}    updatedAt={d.walcl?.updatedAt}
                      stale={!d.walcl}            flash={flash.walcl}
                      unit={d.walcl?.unit}        subtext="↑ Expanding = QE signal" />
                    <MetricCard label="M2 Money Supply"
                      value={d.m2?.value}         change={d.m2?.change}
                      source={d.m2?.source}       updatedAt={d.m2?.updatedAt}
                      stale={!d.m2}              flash={flash.m2}
                      unit={d.m2?.unit}           subtext="BTC lags M2 ~10–12w" />
                  </div>
                </div>
                <div>
                  <SectionLabel>Energy & Inflation</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="WTI Crude Oil"
                      value={d.wti?.value}        change={d.wti?.change}
                      source={d.wti?.source}      updatedAt={d.wti?.updatedAt}
                      stale={!d.wti}              flash={flash.wti}
                      invertSignal                subtext=">$90 = risk-off watch" />
                    <MetricCard label="Natural Gas"
                      value={d.natgas?.value}     change={d.natgas?.change}
                      source={d.natgas?.source}   updatedAt={d.natgas?.updatedAt}
                      stale={!d.natgas}           flash={flash.natgas}
                      invertSignal />
                    <MetricCard label="CPI"
                      value={d.cpi?.value}        change={d.cpi?.change}
                      source={d.cpi?.source}      updatedAt={d.cpi?.updatedAt}
                      stale={!d.cpi}              flash={flash.cpi}
                      invertSignal                unit={d.cpi?.unit}
                      subtext="YoY — lower = risk-on" />
                  </div>
                </div>
              </div>
            )}

            {/* CRYPTO */}
            {tab === "crypto" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                <div>
                  <SectionLabel>Prices</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="BTC / USD"
                      value={d.btc?.value}        change={d.btc?.change}
                      source={d.btc?.source}      updatedAt={d.btc?.updatedAt}
                      stale={!d.btc}              flash={flash.btc} />
                    <MetricCard label="ETH / USD"
                      value={d.eth?.value}        change={d.eth?.change}
                      source={d.eth?.source}      updatedAt={d.eth?.updatedAt}
                      stale={!d.eth}              flash={flash.eth} />
                    <MetricCard label="Funding Rate"
                      value={d.funding?.value}
                      source={d.funding?.source}  updatedAt={d.funding?.updatedAt}
                      stale={!d.funding}          flash={flash.funding}
                      unit="%"
                      signalColor={fundingZoneData.color}
                      changeLabel={d.funding?.value != null ? fundingZoneData.label : null}
                      subtext={fundingZoneData.subtext} />
                    <MetricCard label="Open Interest"
                      value={d.oi?.value}
                      source={d.oi?.source}       updatedAt={d.oi?.updatedAt}
                      stale={!d.oi}               flash={flash.oi}
                      signalColor={oiZoneData.color}
                      changeLabel={d.oi?.value != null ? oiZoneData.label : null}
                      subtext={oiZoneData.subtext} />
                    <MetricCard label="Stablecoin Volume"
                      value={d.stabvol?.value}
                      source={d.stabvol?.source}  updatedAt={d.stabvol?.updatedAt}
                      stale={!d.stabvol}          flash={flash.stabvol}
                      signalColor={stabvolZoneData.color}
                      changeLabel={d.stabvol?.value != null ? stabvolZoneData.label : null}
                      subtext={stabvolZoneData.subtext} />
                  </div>
                </div>

                {/* ── BTC Dominance — expanded card with zone bar ── */}
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px" }}>
                  <SectionLabel>BTC Dominance</SectionLabel>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 24, flexWrap: "wrap" }}>
                    <div>
                      <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, marginBottom: 4 }}>Current</div>
                      <div style={{ fontFamily: sans, fontSize: 36, fontWeight: 700, color: domZoneData.color }}>
                        {d.dom?.value ? parseFloat(d.dom.value).toFixed(2) : "—"}
                        <span style={{ fontSize: 18, marginLeft: 4 }}>%</span>
                      </div>
                      <div style={{ fontFamily: mono, fontSize: 12, color: domZoneData.color, marginTop: 4 }}>
                        {domZoneData.label}
                      </div>
                      <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginTop: 2 }}>
                        {d.dom?.source || "—"} · {d.dom?.updatedAt || "not fetched"}
                      </div>
                    </div>
                    <div style={{ flex: 1, minWidth: 220, paddingTop: 4 }}>
                      <DomZoneBar value={d.dom?.value} />
                      <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 5 }}>
                        {[
                          { range: ">60%",   color: C.blue,      desc: "BTC Phase — hold BTC, avoid alts" },
                          { range: "55–60%", color: C.amber,     desc: "Rotation starting → ETH/SOL/SUI" },
                          { range: "50–55%", color: C.chartBlue, desc: "Altseason approaching" },
                          { range: "40–50%", color: C.green,     desc: "Confirmed altseason — optimal zone" },
                          { range: "<40%",   color: C.red,       desc: "⚠ Euphoria — market top risk" },
                        ].map(z => {
                          const v = parseFloat(d.dom?.value);
                          const active = !isNaN(v) && (
                            (z.range === ">60%"   && v >= 60) ||
                            (z.range === "55–60%" && v >= 55 && v < 60) ||
                            (z.range === "50–55%" && v >= 50 && v < 55) ||
                            (z.range === "40–50%" && v >= 40 && v < 50) ||
                            (z.range === "<40%"   && v < 40)
                          );
                          return (
                            <div key={z.range} style={{ display: "flex", gap: 10, alignItems: "center",
                              background: active ? z.color + "18" : "transparent",
                              borderRadius: 4, padding: "3px 8px" }}>
                              <span style={{ fontFamily: mono, fontSize: 10, color: z.color, minWidth: 46, fontWeight: active ? 700 : 400 }}>{z.range}</span>
                              <span style={{ fontFamily: mono, fontSize: 10, color: active ? C.text : C.muted }}>{z.desc}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>

                {/* ETH/BTC */}
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px" }}>
                  <SectionLabel>ETH / BTC Rotation Tracker</SectionLabel>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 24, flexWrap: "wrap" }}>
                    <div>
                      <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, marginBottom: 4 }}>Current Ratio</div>
                      <div style={{ fontFamily: sans, fontSize: 36, fontWeight: 700,
                        color: parseFloat(d.ethbtc?.value) >= 0.040 ? C.green : C.text }}>
                        {d.ethbtc?.value || "—"}
                      </div>
                      <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginTop: 2 }}>
                        {d.ethbtc?.source || "Sheet"} · {d.ethbtc?.updatedAt || "not fetched"}
                      </div>
                    </div>
                    <div style={{ flex: 1, minWidth: 200, paddingTop: 4 }}>
                      <ETHBTCBar ratio={parseFloat(d.ethbtc?.value)} />
                      <div style={{ marginTop: 12, fontFamily: mono, fontSize: 11, color: C.muted, lineHeight: 1.7 }}>
                        <div>Trigger: <span style={{ color: C.amber }}>0.040</span></div>
                        <div>Status: {!d.ethbtc?.value ? "—"
                          : parseFloat(d.ethbtc.value) >= 0.040
                            ? <span style={{ color: C.green }}>🟢 TRIGGERED — consider rotation</span>
                            : <span style={{ color: C.muted }}>⬜ Not triggered — hold BTC</span>}
                        </div>
                        <div style={{ fontSize: 10, color: C.muted+"99", marginTop: 4 }}>
                          Also require: BTC dominance falling + macro green
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Fear & Greed */}
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px" }}>
                  <SectionLabel>Sentiment</SectionLabel>
                  <div style={{ display: "flex", gap: 32, flexWrap: "wrap", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, marginBottom: 8 }}>Fear & Greed Index</div>
                      <FearGauge value={d.fg?.value != null ? parseFloat(d.fg.value) : null} />
                      <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginTop: 8, textAlign: "center" }}>
                        {d.fg?.updatedAt ? `${d.fg.source} · ${d.fg.updatedAt}` : "Run scan to fetch"}
                      </div>
                    </div>
                    <div style={{ flex: 1, minWidth: 220, display: "flex", flexDirection: "column", gap: 6, paddingTop: 4 }}>
                      {[
                        { range: "< 20",  label: "Extreme Fear",  action: "Accumulate BTC — scale in", color: C.green },
                        { range: "20–40", label: "Fear",          action: "Hold / small buys on dips", color: C.chartBlue },
                        { range: "40–60", label: "Neutral",       action: "Monitor — no edge",          color: C.muted },
                        { range: "60–75", label: "Greed",         action: "Reduce new buys",            color: C.amber },
                        { range: "> 75",  label: "Extreme Greed", action: "Take partial profits",       color: C.red },
                      ].map(r => {
                        const fgv = parseFloat(d.fg?.value);
                        const active = !isNaN(fgv) && (
                          (r.range === "< 20"  && fgv < 20) ||
                          (r.range === "20–40" && fgv >= 20 && fgv < 40) ||
                          (r.range === "40–60" && fgv >= 40 && fgv < 60) ||
                          (r.range === "60–75" && fgv >= 60 && fgv < 75) ||
                          (r.range === "> 75"  && fgv >= 75)
                        );
                        return (
                          <div key={r.range} style={{ display: "flex", gap: 10, alignItems: "center",
                            background: active ? r.color+"18" : "transparent", borderRadius: 4, padding: "4px 8px" }}>
                            <span style={{ fontFamily: mono, fontSize: 11, color: r.color, minWidth: 50 }}>{r.range}</span>
                            <span style={{ fontFamily: mono, fontSize: 11, color: C.muted, minWidth: 90 }}>{r.label}</span>
                            <span style={{ fontFamily: mono, fontSize: 11, color: C.text }}>{r.action}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>

                {/* ETF Flows */}
                <div>
                  <SectionLabel>ETF Flows (Daily)</SectionLabel>
                  <div style={grid}>
                    <MetricCard label="BTC ETF Net Flow"
                      value={d.btcetf?.value}     source={d.btcetf?.source}
                      updatedAt={d.btcetf?.updatedAt} stale={!d.btcetf}
                      flash={flash.btcetf}        subtext="Positive = institutional buy" />
                    <MetricCard label="ETH ETF Net Flow"
                      value={d.ethetf?.value}     source={d.ethetf?.source}
                      updatedAt={d.ethetf?.updatedAt} stale={!d.ethetf}
                      flash={flash.ethetf}        subtext="Positive = institutional buy" />
                    <MetricCard label="SOL ETF Net Flow"
                      value={d.soletf?.value}     source={d.soletf?.source}
                      updatedAt={d.soletf?.updatedAt} stale={!d.soletf}
                      flash={flash.soletf}        change={d.soletf?.change}
                      subtext="SOLZ/GSOL proxy · positive = inflow" />
                  </div>
                </div>
              </div>
            )}

            {/* TRADING */}
            {tab === "trading" && (() => {
              const sui      = d.sui;
              const suiF     = d.sui_funding;
              const suiOI    = d.sui_oi;
              const price    = parseFloat(sui?.value);
              const pp       = parseFloat(d.sui_pp?.value);
              const r1       = parseFloat(d.sui_r1?.value);
              const r2       = parseFloat(d.sui_r2?.value);
              const s1       = parseFloat(d.sui_s1?.value);
              const s2       = parseFloat(d.sui_s2?.value);
              const wh       = parseFloat(d.sui_wh?.value);
              const wl       = parseFloat(d.sui_wl?.value);
              const mh       = parseFloat(d.sui_mh?.value);
              const ml       = parseFloat(d.sui_ml?.value);

              // Price position on range bar
              const rangeMin = isNaN(ml) ? 0 : ml;
              const rangeMax = isNaN(mh) ? 0 : mh;
              const rangePct = (rangeMax > rangeMin && !isNaN(price))
                ? Math.min(100, Math.max(0, ((price - rangeMin) / (rangeMax - rangeMin)) * 100))
                : null;

              // Level position helper
              const lvlPct = v => (!isNaN(v) && rangeMax > rangeMin)
                ? Math.min(100, Math.max(0, ((v - rangeMin) / (rangeMax - rangeMin)) * 100))
                : null;

              // SUI funding zone (reuse same logic as BTC)
              const suiFundVal = parseFloat(suiF?.value);
              const suiFundZone = (() => {
                const v = suiFundVal;
                if (isNaN(v)) return { color: C.muted, label: null, subtext: "Funding signal" };
                if (v > 0.05)  return { color: C.red,      label: `▲ ${v.toFixed(4)}% — Overheated Longs`,  subtext: "⚠ Long squeeze risk"              };
                if (v > 0.01)  return { color: C.green,    label: `▲ ${v.toFixed(4)}% — Bullish`,           subtext: "Healthy long bias"                 };
                if (v > -0.01) return { color: C.chartBlue,label: `► ${v.toFixed(4)}% — Neutral`,           subtext: "Balanced · low squeeze risk"       };
                if (v > -0.05) return { color: C.red,      label: `▼ ${v.toFixed(4)}% — Bearish`,           subtext: "Shorts dominant"                   };
                return              { color: C.amber,     label: `▼ ${v.toFixed(4)}% — Overheated Shorts`, subtext: "⚠ Short squeeze potential"         };
              })();

              // OI zone — use price×OI matrix with SUI price change
              const suiOIchg = suiOI?.change;
              const suiPriceChg = sui?.change;
              const suiOIZone = oiZone(suiOI?.value, suiOIchg, suiPriceChg);

              // Price vs PP zone label
              const priceZone = (!isNaN(price) && !isNaN(pp))
                ? price > r1 ? { label: "Above R1 — Bullish breakout", color: C.green }
                : price > pp ? { label: "Above PP — Bullish bias",     color: C.chartBlue }
                : price > s1 ? { label: "Below PP — Bearish bias",     color: C.amber }
                : price > s2 ? { label: "Below S1 — Weak",             color: C.red }
                : { label: "Below S2 — Deeply oversold",               color: C.red }
                : null;

              const levelRow = (label, val, col, note) => {
                if (isNaN(val)) return null;
                const isPrice = label === "PRICE";
                return (
                  <div key={label} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontFamily: mono, fontSize: 10, color: col, minWidth: 52, fontWeight: isPrice ? 700 : 400 }}>{label}</span>
                    <span style={{ fontFamily: mono, fontSize: isPrice ? 14 : 12, color: isPrice ? C.text : col, fontWeight: isPrice ? 700 : 400 }}>${val.toFixed(4)}</span>
                    {note && <span style={{ fontFamily: mono, fontSize: 10, color: C.muted }}>{note}</span>}
                    {isPrice && priceZone && <span style={{ fontFamily: mono, fontSize: 10, color: priceZone.color, background: priceZone.color+"18", border:`1px solid ${priceZone.color}44`, borderRadius:3, padding:"1px 6px" }}>{priceZone.label}</span>}
                  </div>
                );
              };

              return (
                <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

                  {/* Header metrics row */}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(190px,1fr))", gap: 12 }}>
                    <MetricCard label="SUI / USDT"
                      value={sui?.value}         change={sui?.change}
                      source={sui?.source}       updatedAt={sui?.updatedAt}
                      stale={!sui}               flash={flash.sui} />
                    <MetricCard label="SUI Funding Rate"
                      value={suiF?.value}
                      source={suiF?.source}      updatedAt={suiF?.updatedAt}
                      stale={!suiF}              flash={flash.sui_funding}
                      unit="%"
                      signalColor={suiFundZone.color}
                      changeLabel={suiF?.value != null ? suiFundZone.label : null}
                      subtext={suiFundZone.subtext} />
                    <MetricCard label="SUI Open Interest"
                      value={suiOI?.value}
                      source={suiOI?.source}     updatedAt={suiOI?.updatedAt}
                      stale={!suiOI}             flash={flash.sui_oi}
                      signalColor={suiOIZone.color}
                      changeLabel={suiOI?.value != null ? suiOIZone.label : null}
                      subtext={suiOIZone.subtext} />
                    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "14px 16px" }}>
                      <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.07em" }}>24H Range</div>
                      <div style={{ fontFamily: mono, fontSize: 12, color: C.text, lineHeight: 2 }}>
                        <div>H: <span style={{ color: C.green }}>${isNaN(parseFloat(d.sui_high?.value)) ? "—" : parseFloat(d.sui_high?.value).toFixed(4)}</span></div>
                        <div>L: <span style={{ color: C.red }}>${isNaN(parseFloat(d.sui_low?.value)) ? "—" : parseFloat(d.sui_low?.value).toFixed(4)}</span></div>
                      </div>
                    </div>
                  </div>

                  {/* S/R + Range Chart */}
                  <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px" }}>
                    <SectionLabel>Support & Resistance — Pivot Levels (Daily) + 30-Day Range</SectionLabel>
                    <div style={{ display: "flex", gap: 32, flexWrap: "wrap" }}>

                      {/* Level list */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 8, minWidth: 260 }}>
                        {levelRow("R2",    r2,    C.green,     "2nd resistance")}
                        {levelRow("R1",    r1,    C.chartBlue, "1st resistance")}
                        {levelRow("PP",    pp,    C.amber,     "Pivot point")}
                        {levelRow("PRICE", price, C.text,      null)}
                        {levelRow("S1",    s1,    C.amber,     "1st support")}
                        {levelRow("S2",    s2,    C.red,       "2nd support")}
                        <div style={{ marginTop: 4, borderTop: `1px solid ${C.border}`, paddingTop: 8, display: "flex", flexDirection: "column", gap: 6 }}>
                          {levelRow("7D High", wh, C.green,  "weekly high")}
                          {levelRow("7D Low",  wl, C.red,    "weekly low")}
                          {levelRow("30D High",mh, C.green,  "monthly high")}
                          {levelRow("30D Low", ml, C.red,    "monthly low")}
                        </div>
                      </div>

                      {/* Vertical range bar */}
                      <div style={{ flex: 1, minWidth: 160, display: "flex", gap: 12, alignItems: "stretch" }}>
                        {rangePct !== null && (
                          <div style={{ display: "flex", flexDirection: "column", justifyContent: "space-between", alignItems: "center" }}>
                            {/* Vertical bar */}
                            <div style={{ position: "relative", width: 24, flex: 1,
                              background: `linear-gradient(to bottom, ${C.green}, ${C.chartBlue}, ${C.amber}, ${C.red})`,
                              borderRadius: 6, margin: "4px 0" }}>
                              {/* Price needle */}
                              <div style={{
                                position: "absolute",
                                top: `${100 - rangePct}%`,
                                left: "50%", transform: "translate(-50%, -50%)",
                                width: 36, height: 3, borderRadius: 2,
                                background: C.text, boxShadow: "0 0 6px #000",
                                zIndex: 2
                              }} />
                              {/* Level ticks */}
                              {[
                                { val: r2, col: C.green },
                                { val: r1, col: C.chartBlue },
                                { val: pp, col: C.amber },
                                { val: s1, col: C.amber },
                                { val: s2, col: C.red },
                              ].map(({ val, col }) => {
                                const p = lvlPct(val);
                                if (p === null) return null;
                                return (
                                  <div key={val} style={{
                                    position: "absolute", top: `${100 - p}%`,
                                    left: "100%", marginLeft: 2,
                                    width: 6, height: 1, background: col, opacity: 0.8
                                  }} />
                                );
                              })}
                            </div>
                          </div>
                        )}
                        {/* Labels alongside bar */}
                        {rangePct !== null && (
                          <div style={{ flex: 1, position: "relative", minHeight: 200 }}>
                            {[
                              { val: mh,  label: "30D High", col: C.green },
                              { val: r2,  label: "R2",       col: C.green },
                              { val: r1,  label: "R1",       col: C.chartBlue },
                              { val: pp,  label: "PP",       col: C.amber },
                              { val: s1,  label: "S1",       col: C.amber },
                              { val: s2,  label: "S2",       col: C.red },
                              { val: ml,  label: "30D Low",  col: C.red },
                            ].map(({ val, label, col }) => {
                              const p = lvlPct(val);
                              if (p === null || isNaN(val)) return null;
                              return (
                                <div key={label} style={{
                                  position: "absolute", top: `${100 - p}%`,
                                  transform: "translateY(-50%)",
                                  display: "flex", gap: 6, alignItems: "center"
                                }}>
                                  <span style={{ fontFamily: mono, fontSize: 9, color: col, minWidth: 40 }}>{label}</span>
                                  <span style={{ fontFamily: mono, fontSize: 9, color: C.muted }}>${val.toFixed(4)}</span>
                                </div>
                              );
                            })}
                            {/* Price label */}
                            {!isNaN(price) && (
                              <div style={{
                                position: "absolute", top: `${100 - rangePct}%`,
                                transform: "translateY(-50%)",
                                display: "flex", gap: 6, alignItems: "center"
                              }}>
                                <span style={{ fontFamily: mono, fontSize: 10, color: C.text, fontWeight: 700, minWidth: 40 }}>NOW</span>
                                <span style={{ fontFamily: mono, fontSize: 10, color: C.text, fontWeight: 700 }}>${price.toFixed(4)}</span>
                              </div>
                            )}
                          </div>
                        )}
                        {rangePct === null && (
                          <div style={{ fontFamily: mono, fontSize: 12, color: C.muted, paddingTop: 8 }}>Run scan to load S/R levels</div>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* Liquidation Heatmap — CoinGlass embed */}
                  <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden" }}>
                    <div style={{ padding: "12px 16px", borderBottom: `1px solid ${C.border}`,
                      display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontFamily: mono, fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.07em" }}>Liquidation Heatmap</span>
                        <span style={{ fontFamily: mono, fontSize: 9, color: C.green, background: C.green+"18", border:`1px solid ${C.green}44`, borderRadius: 3, padding: "1px 6px" }}>FREE · LIVE</span>
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <a href="https://www.coinglass.com/LiquidationData/SUI" target="_blank"
                          style={{ fontFamily: mono, fontSize: 10, color: C.blue, textDecoration: "none",
                            background: C.blue+"18", border:`1px solid ${C.blue}44`, borderRadius: 4, padding: "3px 10px" }}>
                          Open CoinGlass ↗
                        </a>
                        <a href="https://www.tradingdifferent.com" target="_blank"
                          style={{ fontFamily: mono, fontSize: 10, color: C.muted, textDecoration: "none",
                            background: C.border, border:`1px solid ${C.border}`, borderRadius: 4, padding: "3px 10px" }}>
                          TradingDifferent ↗
                        </a>
                      </div>
                    </div>
                    {/* CoinGlass SUI liquidation heatmap embed */}
                    <div style={{ position: "relative", width: "100%", paddingBottom: 0 }}>
                      <iframe
                        src="https://www.coinglass.com/pro/futures/LiquidationHeatMap?symbol=SUI&interval=12"
                        style={{ width: "100%", height: 480, border: "none", display: "block",
                          background: C.bg, borderRadius: "0 0 8px 8px" }}
                        title="SUI Liquidation Heatmap — CoinGlass"
                        loading="lazy"
                      />
                    </div>
                    <div style={{ padding: "8px 16px", borderTop: `1px solid ${C.border}` }}>
                      <span style={{ fontFamily: mono, fontSize: 10, color: C.muted }}>
                        Source: CoinGlass (free) · Bright clusters = high leverage concentration · white = likely liquidation zone
                        · if iframe blocked by browser, use the Open CoinGlass link above
                      </span>
                    </div>
                  </div>

                  {/* OI + Funding as liq proxy reminder */}
                  <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 16px",
                    display: "flex", gap: 10, alignItems: "flex-start" }}>
                    <span style={{ color: C.chartBlue, fontSize: 13, marginTop: 1 }}>💡</span>
                    <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, lineHeight: 1.8 }}>
                      <span style={{ color: C.text }}>Reading the heatmap:</span> bright yellow/white clusters are dense liquidation zones.
                      Price tends to gravitate toward them as market makers hunt liquidity.
                      Combine with <span style={{ color: C.text }}>funding rate</span> direction and
                      <span style={{ color: C.text }}> OI trend</span> above to judge whether a run to those levels is likely.
                    </div>
                  </div>

                </div>
              );
            })()}

            {/* CATALYSTS */}
            {tab === "catalysts" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <SectionLabel>Upcoming Events & Macro Triggers</SectionLabel>
                {CATALYSTS.map((c, i) => (
                  <div key={i}
                    onMouseEnter={e => e.currentTarget.style.background = C.hover}
                    onMouseLeave={e => e.currentTarget.style.background = C.surface}
                    style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8,
                      padding: "14px 18px", display: "flex", alignItems: "flex-start", gap: 16,
                      transition: "background 0.15s", flexWrap: "wrap" }}>
                    <div style={{ minWidth: 90, fontFamily: mono, fontSize: 12, color: C.blue, paddingTop: 2 }}>{c.date}</div>
                    <div style={{ flex: 1, minWidth: 200 }}>
                      <div style={{ fontFamily: sans, fontWeight: 600, fontSize: 14, color: C.text, marginBottom: 4 }}>{c.event}</div>
                      <div style={{ fontFamily: mono, fontSize: 12, color: C.muted, lineHeight: 1.6 }}>{c.note}</div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
                      <Tag label={c.impact} />
                      <span style={{ fontFamily: mono, fontSize: 10, color: C.muted }}>Confidence: {c.confidence}</span>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* TIPS */}
            {tab === "tips" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <SectionLabel>Decision Rules & Playbook</SectionLabel>
                {TIPS.map((t, i) => (
                  <div key={i}
                    onMouseEnter={e => e.currentTarget.style.background = C.hover}
                    onMouseLeave={e => e.currentTarget.style.background = C.surface}
                    style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8,
                      padding: "14px 18px", display: "flex", alignItems: "flex-start", gap: 14,
                      transition: "background 0.15s" }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: C.blue, marginTop: 6, flexShrink: 0 }} />
                    <div>
                      <div style={{ fontFamily: sans, fontWeight: 600, fontSize: 13, color: C.blue, marginBottom: 4 }}>{t.label}</div>
                      <div style={{ fontFamily: mono, fontSize: 12, color: C.muted, lineHeight: 1.7 }}>{t.body}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
